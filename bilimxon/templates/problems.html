<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Bilimxon — Masalalar</title>
  <link rel="icon" href="/static/images/logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
  <style>
    *{box-sizing:border-box;}
    body{font-family:'Outfit',sans-serif;background:#0d1117;color:#fff;min-height:100vh;}
    .problems-wrap{padding-top:calc(var(--topbar-h,60px) + 20px);max-width:1100px;margin:0 auto;padding-left:16px;padding-right:16px;padding-bottom:60px;}
    .page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:22px;flex-wrap:wrap;gap:12px;}
    .page-title{font-size:1.5rem;font-weight:900;color:#fff;}
    .page-sub{color:#888;font-size:.83rem;margin-top:3px;}
    .problems-toolbar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center;}
    .search-wrap{flex:1;min-width:180px;position:relative;}
    .search-wrap input{width:100%;padding:9px 14px 9px 38px;border-radius:10px;border:1.5px solid #21262d;background:#161b22;color:#fff;font-size:.88rem;font-family:inherit;outline:none;transition:.15s;}
    .search-wrap input:focus{border-color:#444;}
    .search-wrap input::placeholder{color:#555;}
    .search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#555;}
    .filter-select{padding:9px 12px;border-radius:10px;border:1.5px solid #21262d;background:#161b22;color:#fff;font-size:.83rem;font-family:inherit;outline:none;cursor:pointer;}
    .filter-select option{background:#161b22;}
    .tab-bar{display:flex;gap:5px;margin-bottom:16px;flex-wrap:wrap;}
    .tab-btn{padding:6px 14px;border-radius:20px;font-size:.8rem;font-weight:700;border:1.5px solid #21262d;background:transparent;color:#888;cursor:pointer;transition:.15s;font-family:inherit;}
    .tab-btn.active{border-color:#C9A84C;color:#C9A84C;background:rgba(201,168,76,.08);}
    .tab-btn:hover{border-color:#555;color:#ccc;}
    .problems-table{background:#161b22;border-radius:14px;overflow:hidden;border:1px solid #21262d;}
    .pt-head{display:grid;grid-template-columns:50px 1fr 110px 90px 70px;padding:11px 18px;background:#0d1117;border-bottom:1px solid #21262d;font-size:.72rem;font-weight:800;color:#555;text-transform:uppercase;letter-spacing:.04em;}
    .pt-row{display:grid;grid-template-columns:50px 1fr 110px 90px 70px;padding:12px 18px;border-bottom:1px solid #21262d;cursor:pointer;transition:.15s;align-items:center;}
    .pt-row:last-child{border-bottom:none;}
    .pt-row:hover{background:#1c2128;}
    .pt-num{font-size:.78rem;font-weight:700;color:#555;}
    .pt-title{font-size:.88rem;font-weight:700;color:#e6edf3;}
    .pt-title small{display:block;font-size:.7rem;font-weight:500;color:#666;margin-top:2px;}
    .diff-badge{display:inline-block;padding:2px 10px;border-radius:999px;font-size:.7rem;font-weight:800;}
    .diff-easy{background:rgba(74,222,128,.15);color:#4ade80;}
    .diff-medium{background:rgba(251,191,36,.12);color:#fbbf24;}
    .diff-hard{background:rgba(248,113,113,.12);color:#f87171;}
    .pt-pts{font-size:.83rem;font-weight:700;color:#C9A84C;}
    .pt-solved{font-size:1rem;text-align:center;}
    .stats-row{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;}
    .stat-card{flex:1;min-width:130px;background:#161b22;border:1px solid #21262d;border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:12px;}
    .stat-icon{font-size:1.5rem;flex-shrink:0;}
    .stat-val{font-size:1.3rem;font-weight:900;color:#fff;}
    .stat-lbl{font-size:.72rem;color:#888;font-weight:600;}
    .empty{text-align:center;padding:60px 20px;color:#555;}
    .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:10px;font-size:.82rem;font-weight:700;cursor:pointer;border:none;text-decoration:none;font-family:inherit;transition:.15s;}
    .btn-outline{background:transparent;border:1.5px solid #21262d;color:#888;}
    .btn-outline:hover{border-color:#555;color:#fff;}
    .btn-primary{background:linear-gradient(135deg,#1B3A6B,#C9A84C);color:#fff;}
    .btn-sm{padding:6px 12px;font-size:.78rem;}
    @media(max-width:640px){.pt-head,.pt-row{grid-template-columns:36px 1fr 90px 60px;}.pt-head .pt-pts,.pt-row .pt-pts{display:none;}}
    @media(max-width:480px){.pt-head,.pt-row{grid-template-columns:30px 1fr 80px;}.pt-head div:nth-child(4),.pt-row div:nth-child(4),.pt-head div:nth-child(5),.pt-row div:nth-child(5){display:none;}}
  </style>
</head>
<body>
<nav class="topbar" id="topbar"></nav>
<div class="problems-wrap">
  <div class="page-header">
    <div>
      <h1 class="page-title" data-i18n="prob_title">🧩 Masalalar</h1>
      <p class="page-sub" data-i18n="prob_sub">Algoritmik masalalarni yeching va ball to'plang</p>
    </div>
    <div style="display:flex;gap:8px;">
      <a href="/submissions" class="btn btn-outline btn-sm" style="color:#aaa;border-color:#21262d;background:transparent;">📋 Mening Yechimlarim</a>
      <a href="/leaderboard" class="btn btn-primary btn-sm">🏆 Reyting</a>
    </div>
  </div>

  <div class="stats-row" id="statsRow">
    <div class="stat-card"><span class="stat-icon">🧩</span><div><div class="stat-val" id="stTotal">-</div><div class="stat-lbl">Jami masala</div></div></div>
    <div class="stat-card"><span class="stat-icon">✅</span><div><div class="stat-val" id="stSolved">-</div><div class="stat-lbl">Hal qilingan</div></div></div>
    <div class="stat-card"><span class="stat-icon">⭐</span><div><div class="stat-val" id="stPts">-</div><div class="stat-lbl">Ball</div></div></div>
    <div class="stat-card"><span class="stat-icon">🔥</span><div><div class="stat-val" id="stPct">-</div><div class="stat-lbl">Foiz</div></div></div>
  </div>

  <div class="problems-toolbar">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInp" placeholder="Masala qidirish..." data-i18n-placeholder="prob_search" oninput="filterProblems()">
    </div>
    <select class="filter-select" id="diffSelect" onchange="filterProblems()">
      <option value="">Barcha darajalar</option>
      <option value="easy">🟢 Oson</option>
      <option value="medium">🟡 O'rta</option>
      <option value="hard">🔴 Qiyin</option>
    </select>
  </div>

  <div class="tab-bar" id="catBar">
    <button class="tab-btn active" data-cat="" onclick="setCat('',this)">📋 Hammasi</button>
    <button class="tab-btn" data-cat="Kirish/Chiqish" onclick="setCat('Kirish/Chiqish',this)">💾 Kirish/Chiqish</button>
    <button class="tab-btn" data-cat="Shartli operatorlar" onclick="setCat('Shartli operatorlar',this)">🔀 Shartli</button>
    <button class="tab-btn" data-cat="Sikllar" onclick="setCat('Sikllar',this)">🔁 Sikllar</button>
    <button class="tab-btn" data-cat="Massivlar" onclick="setCat('Massivlar',this)">📊 Massivlar</button>
    <button class="tab-btn" data-cat="Satrlar" onclick="setCat('Satrlar',this)">🔤 Satrlar</button>
    <button class="tab-btn" data-cat="Matematika" onclick="setCat('Matematika',this)">🔢 Matematika</button>
    <button class="tab-btn" data-cat="Rekursiya" onclick="setCat('Rekursiya',this)">🔃 Rekursiya</button>
    <button class="tab-btn" data-cat="Graf" onclick="setCat('Graf',this)">🕸 Graf</button>
    <button class="tab-btn" data-cat="Dinamik" onclick="setCat('Dinamik',this)">⚡ Dinamik</button>
  </div>

  <div class="tab-bar">
    <button class="tab-btn active" data-tab="all" onclick="setTab('all',this)">📋 Hammasi</button>
    <button class="tab-btn" data-tab="unsolved" onclick="setTab('unsolved',this)">❌ Hal qilinmagan</button>
    <button class="tab-btn" data-tab="solved" onclick="setTab('solved',this)">✅ Hal qilingan</button>
  </div>

  <div class="problems-table">
    <div class="pt-head">
      <span>#</span><span>Masala</span><span>Qiyinlik</span><span>Ball</span><span>Holat</span>
    </div>
    <div id="problemsList">
      <div class="empty"><div class="spinner" style="margin:0 auto 12px;"></div>Yuklanmoqda...</div>
    </div>
  </div>
</div>

<script src="/static/js/i18n.js"></script>
<script src="/static/js/app.js"></script>
<script>
let allProblems = [];
let currentTab = 'all';
let currentCat = '';

const diffMap = {easy:'🟢 Oson', medium:"🟡 O'rta", hard:'🔴 Qiyin'};
const diffClass = {easy:'diff-easy', medium:'diff-medium', hard:'diff-hard'};

async function loadProblems() {
  try {
    allProblems = await api('/api/problems');
    renderStats();
    filterProblems();
  } catch(e) {
    document.getElementById('problemsList').innerHTML = `<div class="empty">Yuklab bo'lmadi: ${e.message}</div>`;
  }
}

function renderStats() {
  const solved = allProblems.filter(p=>p.solved).length;
  const pts = allProblems.filter(p=>p.solved).reduce((s,p)=>s+p.points,0);
  document.getElementById('stTotal').textContent = allProblems.length;
  document.getElementById('stSolved').textContent = solved;
  document.getElementById('stPts').textContent = pts;
  document.getElementById('stPct').textContent = allProblems.length ? Math.round(solved/allProblems.length*100)+'%' : '0%';
}

function setTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll('[data-tab]').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  filterProblems();
}

function setCat(cat, btn) {
  currentCat = cat;
  document.querySelectorAll('[data-cat]').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  filterProblems();
}

function filterProblems() {
  const q = document.getElementById('searchInp').value.toLowerCase();
  const diff = document.getElementById('diffSelect').value;
  let list = allProblems;
  if(q) list = list.filter(p=>p.title.toLowerCase().includes(q));
  if(diff) list = list.filter(p=>p.difficulty===diff);
  if(currentCat) list = list.filter(p=>p.category===currentCat);
  if(currentTab==='solved') list = list.filter(p=>p.solved);
  if(currentTab==='unsolved') list = list.filter(p=>!p.solved);
  renderList(list);
}

function renderList(list) {
  if(!list.length) {
    document.getElementById('problemsList').innerHTML = '<div class="empty">😔 Masala topilmadi</div>';
    return;
  }
  document.getElementById('problemsList').innerHTML = list.map((p,i)=>`
    <div class="pt-row" onclick="window.location='/problem/${p.id}'">
      <span class="pt-num">${i+1}</span>
      <div class="pt-title">${p.title}<small>⏱ ${p.time_limit}s · 💾 ${p.memory_limit}MB${p.category ? ` · 🏷 ${p.category}` : ''}</small></div>
      <span><span class="diff-badge ${diffClass[p.difficulty]||'diff-easy'}">${diffMap[p.difficulty]||p.difficulty}</span></span>
      <span class="pt-pts">⭐ ${p.points}</span>
      <span class="pt-solved">${p.solved?'✅':'—'}</span>
    </div>`).join('');
}

document.addEventListener('DOMContentLoaded', loadProblems);
</script>
</body>
</html>
