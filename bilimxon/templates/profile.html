<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Bilimxon — Profil</title>
  <link rel="icon" href="/static/images/logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
  <style>
    body{font-family:'Outfit',sans-serif;}
    .profile-wrap{padding-top:var(--topbar-h);min-height:100vh;background:#0f0f0f;color:#fff;}

    /* ── BANNER ── */
    .banner{width:100%;height:180px;background:linear-gradient(135deg,#1B2A4A,#C9A84C);position:relative;overflow:hidden;cursor:pointer;}
    @media(min-width:700px){.banner{height:220px;}}
    .banner img{width:100%;height:100%;object-fit:cover;}
    .banner-overlay{position:absolute;inset:0;background:rgba(0,0,0,.25);opacity:0;transition:.3s;display:flex;align-items:center;justify-content:center;color:white;font-size:.9rem;font-weight:700;}
    .banner:hover .banner-overlay{opacity:1;}

    /* ── CHANNEL HEADER ── */
    .channel-header{background:#0f0f0f;padding:0 0 0;}
    .channel-inner{max-width:1100px;margin:0 auto;padding:16px 24px 0;}
    .channel-top{display:flex;align-items:flex-start;gap:20px;flex-wrap:wrap;}
    .ch-avatar-wrap{position:relative;flex-shrink:0;}
    .ch-avatar{width:90px;height:90px;border-radius:50%;background:linear-gradient(135deg,#1B3A6B,#C9A84C);object-fit:cover;display:flex;align-items:center;justify-content:center;font-size:2.2rem;font-weight:800;color:white;overflow:hidden;border:3px solid #272727;}
    @media(min-width:600px){.ch-avatar{width:120px;height:120px;}}
    .ch-avatar img{width:100%;height:100%;object-fit:cover;}
    .ch-edit-av{position:absolute;bottom:2px;right:2px;width:28px;height:28px;border-radius:50%;background:#272727;color:#fff;display:flex;align-items:center;justify-content:center;font-size:.8rem;cursor:pointer;border:2px solid #0f0f0f;}
    .ch-info{flex:1;min-width:0;}
    .ch-name{font-size:1.5rem;font-weight:900;color:#fff;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
    .ch-tick{background:#3B82F6;border-radius:50%;width:20px;height:20px;display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:.68rem;flex-shrink:0;}
    .ch-handle{color:#aaa;font-size:.85rem;margin-top:3px;}
    .ch-meta{color:#aaa;font-size:.82rem;margin-top:4px;display:flex;flex-wrap:wrap;gap:6px 14px;}
    .ch-meta span{display:flex;align-items:center;gap:4px;}
    .ch-bio{color:#d0d0d0;font-size:.85rem;margin-top:8px;max-width:560px;line-height:1.5;}
    .ch-socials{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;}
    .ch-social{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:6px;font-size:.75rem;font-weight:700;border:1px solid #333;color:#aaa;text-decoration:none;transition:.15s;}
    .ch-social:hover{border-color:#666;color:#fff;}
    .ch-actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;}
    .ch-btn{padding:8px 16px;border-radius:20px;font-size:.83rem;font-weight:800;cursor:pointer;transition:.15s;border:none;font-family:inherit;}
    .ch-btn-sub{background:#fff;color:#0f0f0f;}
    .ch-btn-sub:hover{background:#e0e0e0;}
    .ch-btn-sub.subbed{background:#272727;color:#fff;border:1.5px solid #444;}
    .ch-btn-edit{background:#272727;color:#fff;border:1px solid #444;}
    .ch-btn-edit:hover{background:#333;}

    /* ── CHANNEL TABS ── */
    .ch-tabs{display:flex;gap:0;border-bottom:1px solid #272727;margin-top:18px;overflow-x:auto;scrollbar-width:none;}
    .ch-tabs::-webkit-scrollbar{display:none;}
    .ch-tab{padding:12px 18px;font-size:.88rem;font-weight:700;color:#aaa;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;transition:.15s;flex-shrink:0;}
    .ch-tab:hover{color:#fff;background:rgba(255,255,255,.05);}
    .ch-tab.active{color:#fff;border-bottom-color:#fff;}

    /* ── TAB CONTENT ── */
    .tab-content{display:none;} .tab-content.active{display:block;}
    .ch-content{max-width:1100px;margin:0 auto;padding:20px 24px 60px;}

    /* ── VIDEO FILTER ── */
    .sort-bar{display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap;}
    .sort-btn{padding:6px 14px;border-radius:20px;border:1px solid #333;background:transparent;color:#aaa;font-size:.8rem;font-weight:700;cursor:pointer;transition:.15s;font-family:inherit;}
    .sort-btn:hover{border-color:#666;color:#fff;}
    .sort-btn.active{background:#fff;color:#0f0f0f;border-color:#fff;}

    /* ── VIDEOS GRID ── */
    .vid-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;}
    @media(max-width:600px){.vid-grid{grid-template-columns:1fr 1fr;gap:8px;}}
    .vid-card{cursor:pointer;border-radius:10px;overflow:hidden;background:#1a1a1a;transition:.15s;}
    .vid-card:hover{background:#272727;transform:translateY(-2px);}
    .vid-thumb{position:relative;padding-top:56.25%;background:#272727;overflow:hidden;}
    .vid-thumb-short{padding-top:177%;}
    .vid-thumb img,.vid-thumb video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
    .vid-type-badge{position:absolute;top:6px;left:6px;background:rgba(0,0,0,.7);color:#fff;font-size:.65rem;font-weight:800;padding:2px 6px;border-radius:6px;}
    .vid-promo-badge{position:absolute;top:6px;right:6px;background:rgba(245,158,11,.8);color:#000;font-size:.65rem;font-weight:800;padding:2px 6px;border-radius:6px;}
    .vid-info{padding:10px 10px 12px;}
    .vid-title{font-size:.82rem;font-weight:700;color:#fff;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
    .vid-stats{font-size:.72rem;color:#aaa;margin-top:5px;}

    /* ── STATS GRID ── */
    .stats-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:20px;}
    .stat-card{background:#1a1a1a;border-radius:12px;padding:16px;border:1px solid #272727;}
    .stat-card-num{font-size:1.6rem;font-weight:900;color:#fff;}
    .stat-card-lbl{font-size:.75rem;color:#aaa;margin-top:4px;}

    /* ── FRIENDS/POSTS ── */
    .friends-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;}
    .friend-card{background:#1a1a1a;border-radius:12px;padding:16px;text-align:center;border:1px solid #272727;cursor:pointer;transition:.15s;}
    .friend-card:hover{background:#272727;}
    .friend-avatar{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#1B3A6B,#C9A84C);margin:0 auto 8px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;font-weight:700;color:white;overflow:hidden;}
    .friend-avatar img{width:100%;height:100%;object-fit:cover;}

    /* ── TITLES ── */
    .titles-grid{display:flex;flex-wrap:wrap;gap:8px;}
    .title-badge{display:inline-flex;align-items:center;gap:4px;padding:6px 14px;border-radius:999px;font-size:.82rem;font-weight:700;border:1px solid currentColor;}

    /* ── INVENTORY ── */
    .inv-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;}
    .inv-item{background:#1a1a1a;border-radius:12px;padding:12px;text-align:center;border:1px solid #272727;}
    .inv-item-img{width:52px;height:52px;border-radius:10px;background:#272727;margin:0 auto 8px;display:flex;align-items:center;justify-content:center;font-size:1.5rem;}
    .rarity-common{color:#9ca3af;} .rarity-uncommon{color:#22c55e;} .rarity-rare{color:#3b82f6;} .rarity-epic{color:#a855f7;} .rarity-legendary{color:#f59e0b;}

    /* ── EDIT SECTION ── */
    .edit-section{background:#1a1a1a;border-radius:14px;padding:20px;border:1px solid #272727;margin-bottom:16px;}
    .edit-section h3{font-size:.95rem;font-weight:800;color:#fff;margin-bottom:14px;}
    .form-label{font-size:.78rem;font-weight:700;color:#aaa;margin-bottom:5px;display:block;}
    .form-control{width:100%;padding:9px 13px;border:1.5px solid #333;border-radius:10px;font-size:.85rem;font-family:inherit;outline:none;background:#272727;color:#fff;transition:.15s;}
    .form-control::placeholder{color:#555;}
    .form-control:focus{border-color:#666;}
    .form-group{margin-bottom:12px;}
    .input-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
    @media(max-width:640px){.input-row{grid-template-columns:1fr;}.banner{height:140px;}}
    .progress-bar{height:5px;background:#272727;border-radius:99px;overflow:hidden;}
    .progress-fill{height:100%;background:linear-gradient(90deg,#1B3A6B,#C9A84C);border-radius:99px;transition:.5s;}
  </style>
</head>
<body>
<nav class="topbar" id="topbar"></nav>
<div class="profile-wrap">

  <!-- BANNER -->
  <div class="banner" id="bannerEl">
    <img id="bannerImg" src="" style="display:none">
    <div class="banner-overlay" id="bannerOverlay" style="display:none;">📷 Banner o'zgartirish</div>
  </div>
  <input type="file" id="bannerFile" accept="image/*" style="display:none">

  <!-- CHANNEL HEADER -->
  <div class="channel-header">
    <div class="channel-inner">
      <div class="channel-top">
        <!-- Avatar -->
        <div class="ch-avatar-wrap">
          <div class="ch-avatar" id="avatarEl"></div>
          <div class="ch-edit-av" id="avatarEditBtn" style="display:none;">✏️</div>
        </div>
        <input type="file" id="avatarFile" accept="image/*" style="display:none">

        <!-- Info -->
        <div class="ch-info">
          <div class="ch-name">
            <span id="profileName"></span>
            <span id="tickBadge" class="ch-tick" style="display:none;">✓</span>
            <span id="activeTitleBadge" class="title-badge" style="display:none;"></span>
          </div>
          <div class="ch-handle">@<span id="profileUsername"></span></div>
          <div class="ch-meta" id="chMeta"></div>
          <div class="ch-bio" id="profileBio"></div>
          <div class="ch-socials" id="socialLinks"></div>
          <div class="ch-actions" id="actionButtons"></div>
        </div>
      </div>

      <!-- Channel Tabs -->
      <div class="ch-tabs" id="profileTabs">
        <div class="ch-tab active" data-tab="about">Bosh sahifa</div>
        <div class="ch-tab" data-tab="videos">Videolar</div>
        <div class="ch-tab" data-tab="friends">Do'stlar</div>
        <div class="ch-tab" data-tab="titles">Unvonlar</div>
        <div class="ch-tab" data-tab="inventory">Inventar</div>
        <div class="ch-tab" id="monetTab" data-tab="monetization" style="display:none;">💰 Daromad</div>
        <div class="ch-tab" id="editTab" data-tab="edit" style="display:none;">⚙️ Tahrirlash</div>
      </div>
    </div>
  </div>

  <!-- TAB CONTENT -->
  <div class="ch-content">

    <!-- ABOUT TAB -->
    <div class="tab-content active" id="tab-about">
      <div class="stats-cards" id="statsCards"></div>
      <div id="courseProgressList"></div>
    </div>

    <!-- VIDEOS TAB -->
    <div class="tab-content" id="tab-videos">
      <div class="sort-bar" id="videoSortBar">
        <span style="font-size:.85rem;font-weight:700;color:#aaa;margin-right:4px;">Saralash:</span>
        <button class="sort-btn active" onclick="setVideoSort('latest',this)">Yangi</button>
        <button class="sort-btn" onclick="setVideoSort('popular',this)">Mashhur</button>
        <button class="sort-btn" onclick="setVideoSort('oldest',this)">Eski</button>
        <button class="sort-btn" id="sortShorts" onclick="setVideoSort('shorts',this)">Shorts</button>
      </div>
      <div id="profileVideosWrap"></div>
    </div>

    <!-- FRIENDS TAB -->
    <div class="tab-content" id="tab-friends">
      <div class="friends-grid" id="friendsGrid">
        <div style="color:#666;padding:20px;">Yuklanmoqda...</div>
      </div>
    </div>

    <!-- TITLES TAB -->
    <div class="tab-content" id="tab-titles">
      <div style="background:#1a1a1a;border-radius:14px;padding:20px;border:1px solid #272727;">
        <h3 style="font-size:.95rem;font-weight:800;color:#fff;margin-bottom:14px;">Barcha Unvonlar</h3>
        <div class="titles-grid" id="titlesGrid"></div>
      </div>
    </div>

    <!-- INVENTORY TAB -->
    <div class="tab-content" id="tab-inventory">
      <div class="inv-grid" id="invGrid">
        <div style="color:#666;padding:20px;">Yuklanmoqda...</div>
      </div>
    </div>

    <!-- MONETIZATSIYA TAB -->
    <div class="tab-content" id="tab-monetization">
      <div id="monetizationWrap" style="color:#aaa;text-align:center;padding:30px;">Yuklanmoqda...</div>
    </div>

    <!-- EDIT TAB -->
    <div class="tab-content" id="tab-edit">
      <div class="edit-section">
        <h3>👤 Asosiy Ma'lumotlar</h3>
        <div class="form-group"><label class="form-label">To'liq Ism</label><input class="form-control" id="editName"></div>
        <div class="form-group"><label class="form-label">Bio</label><textarea class="form-control" id="editBio" rows="3" placeholder="O'zingiz haqingizda..."></textarea></div>
        <div class="form-group">
          <label class="form-label">Profil Rangi</label>
          <div style="display:flex;align-items:center;gap:10px;">
            <input type="color" id="editColor" style="width:44px;height:34px;border:none;border-radius:8px;cursor:pointer;background:transparent;">
            <span style="font-size:.8rem;color:#666;">Avatar va banner rangi</span>
          </div>
        </div>
      </div>

      <div class="edit-section">
        <h3>🔗 Ijtimoiy Tarmoqlar</h3>
        <div class="input-row">
          <div class="form-group"><label class="form-label">🎬 YouTube</label><input class="form-control" id="editYt" placeholder="https://youtube.com/@..."></div>
          <div class="form-group"><label class="form-label">📸 Instagram</label><input class="form-control" id="editIg" placeholder="https://instagram.com/..."></div>
          <div class="form-group"><label class="form-label">✈️ Telegram</label><input class="form-control" id="editTg" placeholder="https://t.me/..."></div>
          <div class="form-group"><label class="form-label">💻 GitHub</label><input class="form-control" id="editGh" placeholder="https://github.com/..."></div>
        </div>
        <div class="form-group" style="grid-column:1/-1;">
          <label class="form-label">Followers (avtomatik)</label>
          <div style="display:flex;align-items:center;gap:10px;padding:12px;background:#272727;border-radius:10px;border:1px solid #333;">
            <div style="flex:1;font-size:.83rem;color:#aaa;">YT: <strong id="ytFollowersVal" style="color:#fff;">0</strong> &nbsp;·&nbsp; IG: <strong id="igFollowersVal" style="color:#fff;">0</strong></div>
            <button type="button" class="ch-btn ch-btn-edit" onclick="fetchFollowers()">🔄 Yangilash</button>
          </div>
          <input type="hidden" id="editYtFollowers" value="0">
          <input type="hidden" id="editIgFollowers" value="0">
        </div>
      </div>

      <div class="edit-section">
        <h3>🏆 Faol Unvon</h3>
        <div id="titleSelector" style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;"></div>
      </div>

      <button class="ch-btn ch-btn-sub" onclick="saveProfile()" style="width:100%;padding:12px;border-radius:10px;font-size:.92rem;">💾 Saqlash</button>
    </div>
  </div>
</div>
<script src="/static/js/i18n.js"></script>
<script src="/static/js/app.js"></script>
<script>
const profileUsername = window.location.pathname.split('/').pop();
let profileData = null;
let isOwnProfile = false;
let myUser = null;

async function loadProfile() {
  myUser = await getMe();
  isOwnProfile = myUser.username === profileUsername;

  try {
    profileData = await api(`/api/profile/${profileUsername}`);
    renderProfile();
    if (isOwnProfile) loadInventory();
  } catch(e) {
    document.getElementById('profileName').textContent = 'Topilmadi';
  }
}

async function renderProfile() {
  const d = profileData;
  document.title = `${d.full_name} — Bilimxon`;
  const fmtNum = n => n >= 1000000 ? (n/1000000).toFixed(1)+'M' : n >= 1000 ? (n/1000).toFixed(1)+'K' : String(n);

  // Banner
  if (d.banner) {
    const bImg = document.getElementById('bannerImg');
    bImg.src = d.banner; bImg.style.display = '';
  } else {
    document.getElementById('bannerEl').style.background =
      `linear-gradient(135deg, ${d.profile_color||'#1B3A6B'}dd, ${d.profile_color||'#1B3A6B'}66)`;
  }

  // Avatar
  const avatarEl = document.getElementById('avatarEl');
  if (d.avatar) {
    avatarEl.innerHTML = `<img src="${d.avatar}" alt="">`;
  } else {
    avatarEl.textContent = (d.full_name||'U').charAt(0).toUpperCase();
    avatarEl.style.background = `linear-gradient(135deg, ${d.profile_color||'#1B3A6B'}, ${d.profile_color||'#1B3A6B'}99)`;
  }

  // Own profile controls
  if (isOwnProfile) {
    document.getElementById('editTab').style.display = '';
    document.getElementById('monetTab').style.display = '';
    document.getElementById('avatarEditBtn').style.display = '';
    document.getElementById('bannerOverlay').style.display = '';
    document.getElementById('actionButtons').innerHTML = `
      <button class="ch-btn ch-btn-edit" onclick="switchTab('edit')">⚙️ Profilni tahrirlash</button>
      <a href="/store" class="ch-btn ch-btn-edit">🛒 Do'kon</a>
      <a href="/blog" class="ch-btn ch-btn-edit">📤 Video yuklash</a>`;
    document.getElementById('editName').value = d.full_name || '';
    document.getElementById('editBio').value  = d.bio || '';
    document.getElementById('editColor').value = d.profile_color || '#1B2A4A';
    document.getElementById('editYt').value = d.yt_link || '';
    document.getElementById('editIg').value = d.ig_link || '';
    document.getElementById('editYtFollowers').value = d.yt_followers || 0;
    document.getElementById('editIgFollowers').value = d.ig_followers || 0;
    const ytEl = document.getElementById('ytFollowersVal');
    const igEl = document.getElementById('igFollowersVal');
    if(ytEl) ytEl.textContent = (d.yt_followers||0).toLocaleString();
    if(igEl) igEl.textContent = (d.ig_followers||0).toLocaleString();
    document.getElementById('editTg').value = d.tg_link || '';
    document.getElementById('editGh').value = d.gh_link || '';
    renderTitleSelector();
  } else {
    document.getElementById('avatarEditBtn').style.display = 'none';
    document.getElementById('bannerOverlay').style.display = 'none';
    renderActionButtons();
  }

  document.getElementById('profileName').textContent = d.full_name || d.username;
  document.getElementById('profileUsername').textContent = d.username;
  if (d.bio) document.getElementById('profileBio').textContent = d.bio;
  if (d.has_tick) document.getElementById('tickBadge').style.display = '';

  // Active title
  if (d.active_title && d.titles.length) {
    const titleObj = d.titles.find(t => t.key === d.active_title);
    if (titleObj) {
      const el = document.getElementById('activeTitleBadge');
      el.style.display = ''; el.style.color = titleObj.color;
      el.textContent = `${titleObj.icon} ${titleObj.label_uz}`;
    }
  }

  // Social links
  const socials = [];
  if (d.yt_link) socials.push(`<a href="${d.yt_link}" target="_blank" class="ch-social">🎬 YouTube</a>`);
  if (d.ig_link) socials.push(`<a href="${d.ig_link}" target="_blank" class="ch-social">📸 Instagram</a>`);
  if (d.tg_link) socials.push(`<a href="${d.tg_link}" target="_blank" class="ch-social" style="background:rgba(42,171,238,.15);border-color:#2AABEE;color:#2AABEE;">✈️ Telegram</a>`);
  if (d.gh_link) socials.push(`<a href="${d.gh_link}" target="_blank" class="ch-social">💻 GitHub</a>`);
  document.getElementById('socialLinks').innerHTML = socials.join('');

  // Channel meta - load follow count from API for accuracy
  document.getElementById('chMeta').innerHTML = `
    <span id="metaSubs">👥 — obunachi</span>
    <span>🎬 — video</span>
    <span>⭐ ${fmtNum(d.points)} ball</span>
    <span>📚 ${d.completed_lessons} dars</span>`;

  // Load real follower count
  fetch(`/api/follow/status/${d.id}`).then(r=>r.json()).then(fs => {
    const subsEl = document.getElementById('metaSubs');
    if(subsEl) subsEl.textContent = `👥 ${fmtNum(fs.followers)} obunachi`;
  }).catch(()=>{});

  // Load video count
  fetch(`/api/profile/${d.id}/videos`).then(r=>r.json()).then(vids => {
    const els = document.getElementById('chMeta')?.querySelectorAll('span');
    if(els && els[1]) els[1].textContent = `🎬 ${vids.length} video`;
  }).catch(()=>{});

  // Stats cards (about tab)
  const rank = d.points >= 1000 ? '🥇 Top Talaba' : d.points >= 500 ? '🥈 Yaxshi' : '🥉 Boshlang\'ich';
  const totalSubs = (d.yt_followers || 0) + (d.ig_followers || 0);

  // Load streak if own profile
  let streakHtml = '';
  if (isOwnProfile) {
    try {
      const sk = await api('/api/streak/status');
      const flame = sk.active_today ? '🔥' : (sk.at_risk ? '⚠️' : '💤');
      streakHtml = `<div class="stat-card" style="border-color:rgba(255,200,0,.25);background:rgba(255,200,0,.05);cursor:pointer;" onclick="window.location='/streak'">
        <div class="stat-card-num" style="color:#ffc800;">${flame} ${sk.streak_days}</div>
        <div class="stat-card-lbl">Kunlik streak →</div>
        <div style="font-size:.65rem;color:#666;margin-top:2px;">Eng uzun: ${sk.longest_streak} kun</div>
      </div>`;
    } catch(e) { streakHtml = ''; }
  }

  document.getElementById('statsCards').innerHTML = `
    <div class="stat-card"><div class="stat-card-num">${fmtNum(d.points)}</div><div class="stat-card-lbl">⭐ Jami ball · ${rank}</div></div>
    <div class="stat-card"><div class="stat-card-num">${d.completed_lessons}</div><div class="stat-card-lbl">📚 Tugatilgan darslar</div></div>

function renderActionButtons() {
  const d = profileData;
  const btns = document.getElementById('actionButtons');
  let html = '';
  // Follow/Subscribe button
  html += `<button class="ch-btn ch-btn-sub" id="followBtn" onclick="toggleFollow(${d.id},this)">+ Obuna</button>`;
  // Load follow status
  api(`/api/follow/status/${d.id}`).then(fs => {
    const fb = document.getElementById('followBtn');
    if(fb) { fb.textContent = fs.following ? '✓ Obuna' : '+ Obuna'; if(fs.following) fb.classList.add('subbed'); }
    // Update meta
    const metaEl = document.getElementById('chMeta');
    if(metaEl) {
      const spans = metaEl.querySelectorAll('span');
      if(spans[0]) spans[0].textContent = `👥 ${fs.followers} obunachi`;
    }
  }).catch(()=>{});
  if (d.friend_status === 'friends') {
    html += `<button class="ch-btn ch-btn-edit" onclick="window.location='/chat?user=${d.id}'">💬 Xabar</button>
             <button class="ch-btn ch-btn-edit" style="color:#f87171;" onclick="removeFriend(${d.id})">❌ Do'stlikdan</button>`;
  } else if (d.friend_status === 'pending_sent') {
    html += `<button class="ch-btn ch-btn-edit" disabled style="opacity:.5;">⏳ So'rov yuborildi</button>`;
  } else if (d.friend_status === 'pending_received') {
    html += `<button class="ch-btn ch-btn-sub" onclick="acceptFriend(${d.id})">✅ Qabul qilish</button>
             <button class="ch-btn ch-btn-edit" onclick="rejectFriend(${d.id})">❌ Rad etish</button>`;
  } else {
    html += `<button class="ch-btn ch-btn-edit" onclick="sendFriendReq(${d.id})">➕ Do'st qo'shish</button>`;
  }
  btns.innerHTML = html;
}

async function toggleFollow(uid, btn) {
  try {
    const r = await api(`/api/follow/${uid}`, {method:'POST'});
    btn.textContent = r.following ? '✓ Obuna' : '+ Obuna';
    btn.classList.toggle('subbed', r.following);
    showToast(r.following ? '✅ Obuna bo\'ldingiz!' : 'Obuna bekor qilindi', 'success');
  } catch(e) { showToast('Xato!','error'); }
}

async function sendFriendReq(to_id) {
  try {
    await api('/api/social/friend-request',{method:'POST',body:JSON.stringify({to_id})});
    showToast("So'rov yuborildi!",'success');
    await loadProfile();
  } catch(e){ showToast(e.message,'error'); }
}
async function acceptFriend(from_id) {
  await api('/api/social/accept-friend',{method:'POST',body:JSON.stringify({from_id})});
  showToast("Do'st qo'shildi!",'success'); await loadProfile();
}
async function rejectFriend(from_id) {
  await api('/api/social/reject-friend',{method:'POST',body:JSON.stringify({from_id})});
  showToast("Rad etildi"); await loadProfile();
}
async function removeFriend(user_id) {
  if (!confirm("Do'stlikdan chiqarilsinmi?")) return;
  await api('/api/social/remove-friend',{method:'POST',body:JSON.stringify({user_id})});
  showToast("Do'stlikdan chiqarildi"); await loadProfile();
}

async function sendGiftNow(username) {
  const gift_type = document.getElementById('giftType').value;
  const gift_value = document.getElementById('giftValue').value;
  const message = document.getElementById('giftMessage')?.value || '';
  try {
    const res = await api('/api/gifts/send', {method:'POST', body:JSON.stringify({to_username:username,gift_type,gift_value,message})});
    if (res.success) {
      document.getElementById('giftModalOverlay').remove();
      showToast('Hadya yuborildi! 🎁', 'success');
    } else showToast(res.error, 'error');
  } catch(e) { showToast(e.message, 'error'); }
}

  const name = tab.dataset.tab;

function switchTab(name) {
  document.querySelectorAll('.ch-tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===name));
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.toggle('active',t.id===`tab-${name}`));
  if(name==='friends') loadFriends();
  if(name==='inventory') loadInventory();
  if(name==='videos') loadProfileVideos();
  if(name==='monetization') loadMonetization();
}

                <input type="color" id="adBgColor" value="${m.ad_bg_color||'#1a1a2e'}" style="width:40px;height:36px;border:none;border-radius:8px;cursor:pointer;background:transparent;padding:0;">
                <span style="font-size:.78rem;color:#666;" id="adBgColorVal">${m.ad_bg_color||'#1a1a2e'}</span>
              </div>
            </div>
          </div>
          <button onclick="saveAdSettings()" style="padding:11px;background:linear-gradient(135deg,#C9A84C,#8B6914);border:none;border-radius:10px;color:#fff;font-weight:800;cursor:pointer;font-family:inherit;font-size:.88rem;">💾 Reklamani Saqlash</button>
        </div>
      </div>
      <div style="background:#1a1a1a;border:1px solid #272727;border-radius:12px;padding:14px;">
        <div style="font-size:.8rem;font-weight:700;color:#aaa;margin-bottom:8px;">📊 Reklama Statistikasi</div>
        <div style="display:flex;gap:20px;">
          <div style="text-align:center;"><div style="font-size:1.4rem;font-weight:900;color:#fff;">${m.total_ad_clicks}</div><div style="font-size:.72rem;color:#888;">Kliklar</div></div>
          <div style="text-align:center;"><div style="font-size:1.4rem;font-weight:900;color:#C9A84C;">${m.views||fmtNum(m.subs)}</div><div style="font-size:.72rem;color:#888;">Ko'rishlar</div></div>
        </div>
      </div>` : ''}

      <!-- Content Creator info -->
      ${!m.is_content_creator ? `
      <div style="background:linear-gradient(135deg,rgba(0,212,255,.05),rgba(0,212,255,.02));border:1px solid rgba(0,212,255,.15);border-radius:12px;padding:14px;margin-top:16px;">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
          <span style="color:#00d4ff;font-size:1.4rem;">◈</span>
          <span style="font-weight:800;color:#fff;font-size:.9rem;">Content Creator Unvoni</span>
        </div>
        <div style="font-size:.8rem;color:#aaa;line-height:1.5;">1000+ obunachi va 100K+ umumiy ko'rishga eting — avtomatik ravishda <span style="color:#00d4ff;font-weight:700;">◈ Content Creator</span> unvoni beriladi.</div>
        <div style="display:flex;gap:16px;margin-top:10px;">
          <div style="font-size:.78rem;"><span style="color:#aaa;">Obunachi: </span><span style="color:#fff;font-weight:700;">${fmtNum(m.subs)} / 1,000</span></div>
          <div style="font-size:.78rem;"><span style="color:#aaa;">Ko'rishlar: </span><span style="color:#fff;font-weight:700;">${fmtNum(m.views)} / 100,000</span></div>
        </div>
      </div>` : `
      <div style="background:linear-gradient(135deg,rgba(0,212,255,.1),rgba(0,212,255,.05));border:1px solid rgba(0,212,255,.3);border-radius:12px;padding:14px;margin-top:16px;display:flex;align-items:center;gap:12px;">
        <span style="color:#00d4ff;font-size:2rem;">◈</span>
        <div><div style="font-weight:900;color:#00d4ff;font-size:1rem;">Content Creator ✅</div><div style="font-size:.78rem;color:#aaa;margin-top:2px;">Siz Content Creator maqomiga egasiz!</div></div>
      </div>`}`;

    document.getElementById('adBgColor')?.addEventListener('input', function() {
      document.getElementById('adBgColorVal').textContent = this.value;
    });
  } catch(e) {
    wrap.innerHTML = `<p style="color:#f87171;text-align:center;">Yuklanmadi: ${e.message}</p>`;
  }
}

async function applyMonetization() {
  try {
    const r = await api('/api/monetization/apply', {method:'POST'});
    showToast(r.message || 'Monetizatsiya yoqildi! ✅', 'success');
    monetLoaded = false; loadMonetization();
  } catch(e) { showToast(e.message, 'error'); }
}

async function saveAdSettings() {
  const d = {
    ad_title: document.getElementById('adTitle')?.value.trim() || '',
    ad_description: document.getElementById('adDesc')?.value.trim() || '',
    ad_link: document.getElementById('adLink')?.value.trim() || '',
    ad_cta: document.getElementById('adCta')?.value.trim() || 'Batafsil',
    ad_bg_color: document.getElementById('adBgColor')?.value || '#1a1a2e',
  };
  if(!d.ad_link) { showToast('Reklama linkini kiriting!', 'error'); return; }
  try {
    await api('/api/monetization/settings', {method:'POST', body:JSON.stringify(d)});
    showToast('Reklama saqlandi ✅', 'success');
  } catch(e) { showToast(e.message, 'error'); }
}

function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function setVideoSort(sort, btn) {
  currentVideoSort = sort;
  document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  videosLoaded = false;
  loadProfileVideos();
}

async function loadProfileVideos() {
  if(videosLoaded) return;
  videosLoaded = true;
  const wrap = document.getElementById('profileVideosWrap');
  wrap.innerHTML = '<div style="text-align:center;padding:20px;color:#666;">Yuklanmoqda...</div>';

  try {
    const uid = profileData?.id;
    if(!uid) { wrap.innerHTML = '<p style="text-align:center;color:#666;">Profil topilmadi</p>'; return; }
    let videos = await api(`/api/profile/${uid}/videos`);

    // Sort
    if(currentVideoSort==='popular') videos.sort((a,b)=>b.views-a.views);
    else if(currentVideoSort==='oldest') videos.sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));
    else if(currentVideoSort==='shorts') videos = videos.filter(v=>v.post_type==='short');

    if(!videos.length) {
      const uploadBtn = isOwnProfile ? `<a href="/blog" style="display:inline-block;margin-top:14px;padding:10px 20px;background:#fff;color:#000;border-radius:20px;font-weight:800;text-decoration:none;font-size:.85rem;">📤 Video yuklash</a>` : '';
      wrap.innerHTML = `<div style="text-align:center;padding:50px 20px;color:#666;">
        <div style="font-size:3rem;margin-bottom:12px;">🎬</div>
        <p style="font-weight:700;font-size:.92rem;">Hali videolar yo'q</p>
        ${uploadBtn}
      </div>`;

      return;
    }

    let html = '<div class="vid-grid">';
    videos.forEach(v => {
      const thumb = v.thumbnail_url || '';
      const isShort = v.post_type === 'short';
      const sid = v.media_url ? escHtml(v.media_url) : '';
      const stitle = escHtml(v.title||v.content||'Video');
      const spromo = escHtml(v.promo_link||'');
      html += `<div class="vid-card" onclick="openVideoModal('${sid}','${stitle}','${spromo}')">
        <div class="vid-thumb ${isShort?'vid-thumb-short':''}">
          ${thumb ? `<img src="${thumb}" loading="lazy" onerror="this.style.display='none'">` : `<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:2.5rem;color:#444;">${isShort?'▶️':'🎬'}</div>`}
          <span class="vid-type-badge">${isShort?'SHORT':'VIDEO'}</span>
          ${v.promo_link ? '<span class="vid-promo-badge">🔗 PROMO</span>' : ''}
        </div>
        <div class="vid-info">
          <div class="vid-title">${stitle}</div>
          <div class="vid-stats">👁 ${v.views||0} · ❤️ ${v.likes_count||0} · ${timeAgo(v.created_at)}</div>
        </div>
      </div>`;
    });
    html += '</div>';
    if(isOwnProfile) {
      html = `<div style="display:flex;justify-content:flex-end;padding:0 0 12px;">
        <a href="/blog" style="padding:8px 18px;background:#fff;color:#000;border-radius:20px;font-weight:800;text-decoration:none;font-size:.82rem;">📤 Yangi Video / Short</a>
      </div>` + html;
    }
    wrap.innerHTML = html;
  } catch(e) { wrap.innerHTML = '<p style="text-align:center;color:#f87171;">Yuklanishda xato</p>'; }
}

// Video modal
function openVideoModal(src, title, promoLink) {
  if(!src) return;
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;top:var(--topbar-h,60px);';
  overlay.onclick = (e) => { if(e.target===overlay) overlay.remove(); };
  overlay.innerHTML = `<div style="background:#1a1a1a;border-radius:14px;overflow:hidden;max-width:500px;width:100%;position:relative;border:1px solid #333;">
    <button onclick="this.closest('[style*=fixed]').remove()" style="position:absolute;top:10px;right:10px;z-index:2;background:rgba(255,255,255,.1);border:none;color:#fff;width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:.9rem;">✕</button>
    <video controls autoplay style="width:100%;max-height:80vh;display:block;" src="${src}"></video>
    ${title ? `<div style="padding:10px 14px;color:#fff;font-weight:700;font-size:.88rem;">${title}</div>` : ''}
    ${promoLink ? `<a href="${promoLink}" target="_blank" rel="noopener" style="display:flex;align-items:center;gap:8px;padding:10px 14px;background:rgba(245,158,11,.15);border-top:1px solid #333;text-decoration:none;">
      <span>🔗</span><span style="color:#fbbf24;font-size:.82rem;font-weight:700;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${promoLink}</span><span style="color:#fbbf24;">→</span>
    </a>` : ''}
  </div>`;
  document.body.appendChild(overlay);
}

function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

document.addEventListener('DOMContentLoaded', loadProfile);
</script>
</body>
