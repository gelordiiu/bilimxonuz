<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bilimxon — Dars</title>
  <link rel="icon" href="/static/images/logo.png" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
  <style>
    :root{--duo-green:#58cc02;--duo-red:#ff4b4b;--duo-blue:#1cb0f6;--duo-gold:#ffc800;--duo-purple:#ce82ff;}
    *{box-sizing:border-box;}
    body{background:#0d1117;margin:0;font-family:'Outfit',sans-serif;}
    .dl-topbar{position:fixed;top:0;left:0;right:0;height:64px;background:#0d1117;border-bottom:2px solid #21262d;display:flex;align-items:center;gap:16px;padding:0 20px;z-index:100;}
    .dl-close{width:36px;height:36px;background:rgba(255,255,255,.06);border:none;border-radius:10px;color:#aaa;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;text-decoration:none;transition:.15s;}
    .dl-close:hover{background:rgba(255,255,255,.12);color:#fff;}
    .dl-progress-wrap{flex:1;height:16px;background:#21262d;border-radius:99px;overflow:hidden;}
    .dl-progress-fill{height:100%;background:linear-gradient(90deg,var(--duo-green),#4ade80);border-radius:99px;transition:width .5s cubic-bezier(.34,1.56,.64,1);position:relative;}
    .dl-progress-fill::after{content:'';position:absolute;right:4px;top:3px;width:8px;height:8px;background:rgba(255,255,255,.5);border-radius:50%;}
    .dl-hearts{display:flex;gap:4px;align-items:center;flex-shrink:0;}
    .dl-heart{font-size:1.1rem;transition:.2s;}
    .dl-heart.lost{opacity:.25;filter:grayscale(1);}
    .dl-xp-badge{background:rgba(255,200,0,.12);border:1.5px solid rgba(255,200,0,.25);border-radius:20px;padding:4px 12px;font-size:.75rem;font-weight:800;color:var(--duo-gold);flex-shrink:0;}
    .dl-main{max-width:720px;margin:0 auto;padding:88px 20px 120px;min-height:100vh;}
    .dl-lesson-card{background:#161b22;border:2px solid #21262d;border-radius:24px;padding:32px;margin-bottom:20px;animation:dlSlideIn .4s cubic-bezier(.34,1.2,.64,1);}
    @keyframes dlSlideIn{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
    .dl-lesson-header{display:flex;align-items:center;gap:14px;margin-bottom:24px;}
    .dl-lesson-icon{width:54px;height:54px;border-radius:16px;background:linear-gradient(135deg,rgba(201,168,76,.2),rgba(201,168,76,.05));border:2px solid rgba(201,168,76,.3);display:flex;align-items:center;justify-content:center;font-size:1.6rem;flex-shrink:0;}
    .dl-lesson-meta{flex:1;}
    .dl-lesson-title{font-size:1.25rem;font-weight:800;color:#fff;margin-bottom:4px;line-height:1.2;}
    .dl-lesson-sub{font-size:.78rem;color:#555;font-weight:600;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
    .dl-tag{background:rgba(255,255,255,.06);border-radius:6px;padding:2px 8px;font-size:.68rem;color:#666;font-weight:700;}
    .dl-lesson-body{font-size:.95rem;color:rgba(255,255,255,.8);line-height:1.8;}
    .dl-lesson-body h2{font-size:1.05rem;font-weight:800;color:#fff;margin:20px 0 8px;}
    .dl-lesson-body h3{font-size:.95rem;font-weight:700;color:#C9A84C;margin:16px 0 6px;}
    .dl-lesson-body p{margin:0 0 12px;}
    .dl-lesson-body ul{padding-left:20px;margin:0 0 12px;}
    .dl-lesson-body li{margin-bottom:6px;}
    .dl-lesson-body strong{color:#fff;}
    .dl-lesson-body code{background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:1px 6px;font-family:'Fira Code',monospace;font-size:.85rem;color:#79c0ff;}
    .dl-code-block{background:#0d1117;border:2px solid #21262d;border-radius:16px;overflow:hidden;margin:20px 0;}
    .dl-code-header{padding:10px 16px;background:#161b22;border-bottom:1px solid #21262d;display:flex;align-items:center;justify-content:space-between;}
    .dl-code-lang{font-size:.72rem;font-weight:800;color:#C9A84C;text-transform:uppercase;letter-spacing:.06em;}
    .dl-code-copy{background:rgba(255,255,255,.07);border:1px solid #30363d;border-radius:8px;padding:4px 12px;color:#aaa;font-size:.72rem;font-weight:700;cursor:pointer;font-family:inherit;transition:.15s;}
    .dl-code-copy:hover{background:rgba(255,255,255,.12);color:#fff;}
    .dl-code-pre{padding:18px 20px;margin:0;font-family:'Fira Code',monospace;font-size:.85rem;color:#e6edf3;overflow-x:auto;line-height:1.65;}
    .dl-quiz-header{text-align:center;margin-bottom:28px;}
    .dl-quiz-label{display:inline-flex;align-items:center;gap:8px;background:rgba(88,204,2,.1);border:1.5px solid rgba(88,204,2,.25);border-radius:20px;padding:6px 18px;font-size:.8rem;font-weight:800;color:var(--duo-green);margin-bottom:14px;}
    .dl-quiz-q{font-size:1.1rem;font-weight:800;color:#fff;line-height:1.5;}
    .dl-options{display:flex;flex-direction:column;gap:10px;margin:20px 0;}
    .dl-option{padding:14px 18px;background:#161b22;border:2.5px solid #21262d;border-radius:16px;cursor:pointer;transition:.18s;display:flex;align-items:center;gap:14px;font-size:.9rem;font-weight:600;color:rgba(255,255,255,.85);}
    .dl-option:hover:not(.disabled){border-color:#3d444d;background:#1c2128;transform:translateX(4px);}
    .dl-option.selected{border-color:var(--duo-blue);background:rgba(28,176,246,.1);color:#fff;}
    .dl-option.correct{border-color:var(--duo-green);background:rgba(88,204,2,.12);color:#fff;animation:dlBounce .4s cubic-bezier(.34,1.56,.64,1);}
    .dl-option.wrong{border-color:var(--duo-red);background:rgba(255,75,75,.1);color:rgba(255,255,255,.6);}
    @keyframes dlBounce{0%{transform:scale(1)}40%{transform:scale(1.03)}100%{transform:scale(1)}}
    .dl-option-letter{width:30px;height:30px;border-radius:8px;background:rgba(255,255,255,.07);display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:800;color:#666;flex-shrink:0;border:1.5px solid rgba(255,255,255,.08);}
    .dl-option.selected .dl-option-letter{background:rgba(28,176,246,.2);color:var(--duo-blue);border-color:var(--duo-blue);}
    .dl-option.correct .dl-option-letter{background:rgba(88,204,2,.2);color:var(--duo-green);border-color:var(--duo-green);}
    .dl-option.wrong .dl-option-letter{background:rgba(255,75,75,.15);color:var(--duo-red);border-color:var(--duo-red);}
    .disabled{cursor:default!important;}
    .dl-result-bar{margin:16px 0;padding:14px 18px;border-radius:14px;display:flex;align-items:flex-start;gap:12px;font-size:.88rem;}
    .dl-result-bar.correct-bar{background:rgba(88,204,2,.1);border:2px solid rgba(88,204,2,.25);}
    .dl-result-bar.wrong-bar{background:rgba(255,75,75,.08);border:2px solid rgba(255,75,75,.2);}
    .dl-result-icon{font-size:1.4rem;flex-shrink:0;}
    .dl-result-title{font-weight:800;color:#fff;margin-bottom:3px;}
    .dl-result-hint{font-size:.8rem;color:#888;line-height:1.5;}
    .dl-action-bar{position:fixed;bottom:0;left:0;right:0;background:#0d1117;border-top:2px solid #21262d;padding:14px 20px;display:flex;justify-content:center;z-index:100;}
    .dl-action-inner{width:100%;max-width:720px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
    .dl-btn{padding:14px 36px;border-radius:16px;border:none;font-size:.95rem;font-weight:800;cursor:pointer;font-family:inherit;transition:.18s;display:flex;align-items:center;gap:8px;}
    .dl-btn:active{transform:scale(.97);}
    .dl-btn-check{background:var(--duo-green);color:#fff;box-shadow:0 4px 0 #46a302;flex:1;justify-content:center;}
    .dl-btn-check:hover{filter:brightness(1.08);}
    .dl-btn-check:disabled{background:#21262d;color:#444;box-shadow:none;cursor:not-allowed;}
    .dl-btn-skip{background:rgba(255,255,255,.06);color:#666;border:2px solid #21262d;}
    .dl-btn-skip:hover{background:rgba(255,255,255,.1);color:#aaa;}
    .dl-btn-next{background:var(--duo-blue);color:#fff;box-shadow:0 4px 0 #0e86bc;flex:1;justify-content:center;}
    .dl-btn-next:hover{filter:brightness(1.08);}
    .dl-btn-finish{background:var(--duo-gold);color:#000;box-shadow:0 4px 0 #cc9f00;flex:1;justify-content:center;}
    .dl-finish{text-align:center;padding:40px 20px;animation:dlSlideIn .5s cubic-bezier(.34,1.2,.64,1);}
    .dl-finish-trophy{font-size:5rem;margin-bottom:16px;animation:dlBounce .6s cubic-bezier(.34,1.56,.64,1) .2s both;display:block;}
    .dl-finish-title{font-size:1.6rem;font-weight:900;color:#fff;margin-bottom:8px;}
    .dl-finish-sub{font-size:.9rem;color:#888;margin-bottom:28px;}
    .dl-finish-stats{display:flex;justify-content:center;gap:20px;margin-bottom:32px;flex-wrap:wrap;}
    .dl-stat-pill{background:#161b22;border:2px solid #21262d;border-radius:16px;padding:14px 20px;min-width:90px;text-align:center;}
    .dl-stat-pill .val{font-size:1.4rem;font-weight:800;color:#C9A84C;}
    .dl-stat-pill .lbl{font-size:.7rem;color:#555;font-weight:700;margin-top:2px;}
    .dl-finish-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
    .dl-finish-btn{padding:13px 28px;border-radius:14px;border:none;font-size:.88rem;font-weight:800;cursor:pointer;font-family:inherit;text-decoration:none;display:inline-flex;align-items:center;gap:8px;transition:.15s;}
    .dl-finish-btn:active{transform:scale(.97);}
    .dl-confetti-wrap{pointer-events:none;position:fixed;inset:0;z-index:9999;overflow:hidden;}
    .dl-confetti-p{position:absolute;width:10px;height:10px;border-radius:2px;animation:dlConfettiFall linear forwards;}
    @keyframes dlConfettiFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
    @keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
    @media(max-width:600px){.dl-main{padding:80px 12px 100px;}.dl-lesson-card{padding:20px;}.dl-btn{padding:13px 20px;font-size:.88rem;}}
  </style>
</head>
<body>
<div class="dl-topbar">
  <a href="/" class="dl-close" id="dlClose" title="Chiqish">✕</a>
  <div class="dl-progress-wrap"><div class="dl-progress-fill" id="dlProgressFill" style="width:0%"></div></div>
  <div class="dl-hearts"><span class="dl-heart" id="h1">❤️</span><span class="dl-heart" id="h2">❤️</span><span class="dl-heart" id="h3">❤️</span></div>
  <div class="dl-xp-badge" id="dlXpBadge">⭐ 0 XP</div>
</div>
<div class="dl-main" id="dlMain">
  <div style="text-align:center;padding:60px 0;color:#555;">
    <div style="font-size:2rem;margin-bottom:12px;animation:spin 1s linear infinite;display:inline-block;">⏳</div>
    <div>Dars yuklanmoqda...</div>
  </div>
</div>
<div class="dl-action-bar" id="dlActionBar" style="display:none;"></div>
<script src="/static/js/i18n.js"></script>
<script src="/static/js/app.js"></script>
<script>
const mavzu_id=parseInt(window.location.pathname.split('/').pop());
let lessonData=null,quizData=null,quizCurrent=0,quizAnswers={},quizSubmitted=false;
let hearts=3,xp=0,phase='lesson',totalSteps=1;

async function init(){
  try{
    lessonData=await api(`/api/lesson/${mavzu_id}`);
    document.title=`Bilimxon — ${lessonData.title}`;
    document.getElementById('dlClose').href=`/course/${lessonData.course_slug}`;
    if(lessonData.has_quiz){
      quizData=await api(`/api/lesson/${mavzu_id}/quiz`);
      totalSteps=1+(quizData?.questions?.length||0);
    }
    updateProgress(0);
    showLessonPhase();
  }catch(e){
    document.getElementById('dlMain').innerHTML=`<div style="padding:40px;text-align:center;color:#f87171;">${e.message}</div>`;
  }
}

function updateProgress(step){
  document.getElementById('dlProgressFill').style.width=Math.round((step/totalSteps)*100)+'%';
}

function loseHeart(){
  hearts=Math.max(0,hearts-1);
  const el=document.getElementById('h'+(3-hearts));
  if(el)el.classList.add('lost');
}

function addXP(pts){
  xp+=pts;
  const badge=document.getElementById('dlXpBadge');
  badge.textContent='⭐ '+xp+' XP';
  badge.style.transform='scale(1.25)';
  setTimeout(()=>badge.style.transform='',300);
}

function showLessonPhase(){
  phase='lesson';
  const d=lessonData;
  document.getElementById('dlMain').innerHTML=`
    <div class="dl-lesson-card">
      <div class="dl-lesson-header">
        <div class="dl-lesson-icon">📚</div>
        <div class="dl-lesson-meta">
          <div class="dl-lesson-title">${d.title}</div>
          <div class="dl-lesson-sub">
            <span>${d.bob_title||d.course_slug||''}</span>
            ${d.has_quiz?'<span class="dl-tag">📝 Test bor</span>':''}
            ${d.has_code?'<span class="dl-tag">💻 Kod bor</span>':''}
            ${d.video_url?'<span class="dl-tag">🎬 Video bor</span>':''}
          </div>
        </div>
      </div>
      ${buildVideoHtml(d)}
      <div class="dl-lesson-body">${renderMarkdown(d.content)}</div>
      ${d.code_example?`
      <div class="dl-code-block">
        <div class="dl-code-header">
          <span class="dl-code-lang">💻 Kod namunasi</span>
          <button class="dl-code-copy" onclick="copyCode(this)">📋 Nusxa</button>
        </div>
        <pre class="dl-code-pre" id="codeBlock">${escapeHtml(d.code_example)}</pre>
      </div>`:''}
    </div>`;
  const bar=document.getElementById('dlActionBar');
  bar.style.display='';
  bar.innerHTML=`<div class="dl-action-inner">
    <button class="dl-btn dl-btn-skip" onclick="window.location.href='/course/${lessonData.course_slug}'">← Orqaga</button>
    <button class="dl-btn dl-btn-check" onclick="finishLesson()">${d.has_quiz?"Testga o'tish 📝":"Darsni tugatish ✅"}</button>
  </div>`;
  updateProgress(0);
}

async function finishLesson(){
  addXP(10);
  if(lessonData.has_quiz&&quizData?.questions?.length){showQuizPhase();}
  else{await submitCompletion(100);showFinishPhase(true,100,0,0);}
}

function showQuizPhase(){
  phase='quiz';quizCurrent=0;quizAnswers={};quizSubmitted=false;showQuizQuestion();
}

function showQuizQuestion(){
  const q=quizData.questions[quizCurrent];
  const total=quizData.questions.length;
  const letters=['A','B','C','D','E'];
  updateProgress(1+quizCurrent);
  document.getElementById('dlMain').innerHTML=`
    <div class="dl-lesson-card">
      <div class="dl-quiz-header">
        <div class="dl-quiz-label">📝 Savol ${quizCurrent+1} / ${total}</div>
        <div class="dl-quiz-q">${q.question}</div>
      </div>
      <div class="dl-options" id="optionsList">
        ${q.options.map((opt,i)=>`
          <div class="dl-option" id="opt-${i}" onclick="selectOption(${i})">
            <div class="dl-option-letter">${letters[i]}</div>
            <span>${opt}</span>
          </div>`).join('')}
      </div>
      <div id="resultBar"></div>
    </div>`;
  document.getElementById('dlActionBar').innerHTML=`<div class="dl-action-inner">
    <button class="dl-btn dl-btn-check" id="checkBtn" onclick="checkAnswer()" disabled>Tekshirish ✓</button>
  </div>`;
}

function selectOption(idx){
  if(quizSubmitted)return;
  quizAnswers[quizCurrent]=idx;
  document.querySelectorAll('.dl-option').forEach((el,i)=>el.classList.toggle('selected',i===idx));
  document.getElementById('checkBtn').disabled=false;
}

function checkAnswer(){
  if(quizSubmitted)return;
  quizSubmitted=true;
  const q=quizData.questions[quizCurrent];
  const chosen=quizAnswers[quizCurrent];
  const correct=q.correct_idx;
  const isCorrect=chosen===correct;
  document.querySelectorAll('.dl-option').forEach((el,i)=>{
    el.classList.add('disabled');
    if(i===correct)el.classList.add('correct');
    else if(i===chosen&&!isCorrect)el.classList.add('wrong');
  });
  const bar=document.getElementById('resultBar');
  if(isCorrect){
    addXP(20);
    bar.innerHTML=`<div class="dl-result-bar correct-bar"><div class="dl-result-icon">✅</div><div><div class="dl-result-title">To'g'ri!</div><div class="dl-result-hint">${q.explanation||'Ajoyib! Davom eting.'}</div></div></div>`;
  }else{
    loseHeart();
    bar.innerHTML=`<div class="dl-result-bar wrong-bar"><div class="dl-result-icon">❌</div><div><div class="dl-result-title">Noto'g'ri</div><div class="dl-result-hint">To'g'ri: <strong style="color:#fff;">${q.options[correct]}</strong>${q.explanation?'<br>'+q.explanation:''}</div></div></div>`;
  }
  const isLast=quizCurrent===quizData.questions.length-1;
  document.getElementById('dlActionBar').innerHTML=`<div class="dl-action-inner">
    <button class="dl-btn dl-btn-next" onclick="${isLast?'finishQuiz()':'nextQuestion()'}">${isLast?"Natijani ko'rish 🏆":"Keyingisi →"}</button>
  </div>`;
}

function nextQuestion(){quizCurrent++;quizSubmitted=false;showQuizQuestion();}

async function finishQuiz(){
  const total=quizData.questions.length;
  let correct=0;
  quizData.questions.forEach((q,i)=>{if(quizAnswers[i]===q.correct_idx)correct++;});
  const score=Math.round((correct/total)*100);
  addXP(score>=80?30:score>=50?15:5);
  await submitCompletion(score);
  showFinishPhase(score>=50,score,correct,total);
}

async function submitCompletion(quizScore){
  try{await api('/api/progress/complete',{method:'POST',body:JSON.stringify({mavzu_id,quiz_score:quizScore})});}
  catch(e){}
}

function showFinishPhase(passed,score,correct,total){
  phase='done';
  updateProgress(totalSteps);
  const emoji=passed?'🏆':'💪';
  document.getElementById('dlMain').innerHTML=`
    <div class="dl-finish">
      <span class="dl-finish-trophy">${emoji}</span>
      <div class="dl-finish-title">${passed?"Zo'r! Dars tugadi!":"Davom eting!"}</div>
      <div class="dl-finish-sub">${passed?"Siz ushbu darsni muvaffaqiyatli yakunladingiz.":"Yana bir bor urinib ko'ring!"}</div>
      <div class="dl-finish-stats">
        <div class="dl-stat-pill"><div class="val">⭐ ${xp}</div><div class="lbl">XP to'plandi</div></div>
        ${total?`<div class="dl-stat-pill"><div class="val">${correct}/${total}</div><div class="lbl">To'g'ri javob</div></div>
        <div class="dl-stat-pill"><div class="val">${score}%</div><div class="lbl">Ball</div></div>`:''}
        <div class="dl-stat-pill"><div class="val">${hearts}/3</div><div class="lbl">❤️ Qoldi</div></div>
      </div>
      <div class="dl-finish-btns">
        ${lessonData.next_id
          ?`<a href="/lesson/${lessonData.next_id}" class="dl-finish-btn" style="background:var(--duo-green);color:#fff;box-shadow:0 4px 0 #46a302;">Keyingi dars →</a>`
          :`<a href="/course/${lessonData.course_slug}" class="dl-finish-btn" style="background:var(--duo-green);color:#fff;box-shadow:0 4px 0 #46a302;">Kursga qaytish 🎉</a>`}
        <a href="/dashboard" class="dl-finish-btn" style="background:#161b22;color:#aaa;border:2px solid #21262d;">Dashboard</a>
      </div>
    </div>`;
  document.getElementById('dlActionBar').style.display='none';
  if(passed)launchConfetti();
}

function launchConfetti(){
  const wrap=document.createElement('div');wrap.className='dl-confetti-wrap';document.body.appendChild(wrap);
  const colors=['#C9A84C','#58cc02','#1cb0f6','#ff4b4b','#ce82ff','#ffc800'];
  for(let i=0;i<60;i++){
    const p=document.createElement('div');p.className='dl-confetti-p';
    p.style.cssText=`left:${Math.random()*100}vw;background:${colors[Math.floor(Math.random()*colors.length)]};animation-duration:${1.5+Math.random()*1.5}s;animation-delay:${Math.random()*.8}s;width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:${Math.random()>.5?'50%':'2px'};`;
    wrap.appendChild(p);
  }
  setTimeout(()=>wrap.remove(),3500);
}

function copyCode(btn){
  const pre=document.getElementById('codeBlock');
  if(pre)navigator.clipboard?.writeText(pre.textContent).then(()=>{btn.textContent='✅ Nusxalandi!';setTimeout(()=>btn.textContent='📋 Nusxa',1500);});
}

function switchVideoLang(btn) {
  const url = btn.dataset.url;
  if (!url) return;
  const player = document.getElementById('mainVideoPlayer');
  if (!player) return;
  const currentTime = player.currentTime;
  const wasPlaying = !player.paused;
  player.innerHTML = `<source src="${url}" type="video/mp4"><source src="${url}" type="video/webm">`;
  player.load();
  player.currentTime = currentTime;
  if (wasPlaying) player.play().catch(()=>{});
  // Update button styles
  document.querySelectorAll('.vid-lang-btn').forEach(b => {
    b.style.borderColor = '#21262d';
    b.style.background = 'transparent';
    b.style.color = '#555';
  });
  btn.style.borderColor = '#C9A84C';
  btn.style.background = 'rgba(201,168,76,.15)';
  btn.style.color = '#C9A84C';
}
function escapeHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function buildVideoHtml(d){
  const urls = [d.video_url_uz, d.video_url_ru, d.video_url_en, d.video_url].filter(Boolean);
  if(!urls.length) return '';
  const curLang = (document.cookie.match(/lang=([^;]+)/)||[])[1]||'uz';
  let best = d.video_url || '';
  if(curLang==='ru' && d.video_url_ru) best = d.video_url_ru;
  else if(curLang==='en' && d.video_url_en) best = d.video_url_en;
  else if(d.video_url_uz) best = d.video_url_uz;
  if(!best) best = urls[0];

  const langs = [];
  if(d.video_url_uz) langs.push({code:'uz', flag:'🇺🇿', label:'UZ', url:d.video_url_uz});
  if(d.video_url_ru) langs.push({code:'ru', flag:'🇷🇺', label:'RU', url:d.video_url_ru});
  if(d.video_url_en) langs.push({code:'en', flag:'🇺🇸', label:'EN', url:d.video_url_en});
  const hasMulti = langs.length > 1;

  const btnStyle = (url) => url===best
    ? 'padding:4px 10px;border-radius:6px;border:1.5px solid #C9A84C;background:rgba(201,168,76,.15);color:#C9A84C;font-size:.72rem;font-weight:700;cursor:pointer;font-family:inherit;'
    : 'padding:4px 10px;border-radius:6px;border:1.5px solid #21262d;background:transparent;color:#555;font-size:.72rem;font-weight:700;cursor:pointer;font-family:inherit;';

  return `<div id="videoPlayerWrap" style="margin-bottom:20px;border-radius:16px;overflow:hidden;background:#000;border:2px solid #21262d;">
    ${hasMulti ? `<div style="display:flex;gap:6px;padding:10px 12px;background:#0d1117;border-bottom:1px solid #21262d;align-items:center;">
      <span style="font-size:.72rem;font-weight:700;color:#555;margin-right:4px;">🌐 Til:</span>
      ${langs.map(l=>`<button onclick="switchVideoLang(this)" data-url="${l.url}" class="vid-lang-btn" style="${btnStyle(l.url)}">${l.flag} ${l.label}</button>`).join('')}
    </div>` : ''}
    <video id="mainVideoPlayer" controls style="width:100%;max-height:400px;display:block;" preload="metadata">
      <source src="${best}" type="video/mp4">
      <source src="${best}" type="video/webm">
      <source src="${best}">
    </video>
  </div>`;
}

function renderMarkdown(text){
  if(!text) return '';
  // Escape HTML first
  text = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  // Headers
  text = text.replace(/^### (.+)$/gm,'<h3>$1</h3>');
  text = text.replace(/^## (.+)$/gm,'<h2>$1</h2>');
  text = text.replace(/^# (.+)$/gm,'<h2>$1</h2>');
  // Bold BEFORE italic
  text = text.replace(/\*\*([^*\n]+)\*\*/g,'<strong>$1</strong>');
  // Italic
  text = text.replace(/\*([^*\n]+)\*/g,'<em>$1</em>');
  // Inline code
  text = text.replace(/`([^`\n]+)`/g,'<code>$1</code>');
  // Lists — collect consecutive list items into ul
  text = text.replace(/^[-*] (.+)$/gm,'<li>$1</li>');
  text = text.replace(/(<li>[^\n]*<\/li>\n?)+/g, (match) => '<ul>' + match + '</ul>');
  // Paragraphs — double newline
  const lines = text.split('\n');
  let result = '';
  let inPara = false;
  for(const line of lines){
    const trimmed = line.trim();
    if(!trimmed){
      if(inPara){ result += '</p>'; inPara = false; }
    } else if(trimmed.startsWith('<h') || trimmed.startsWith('<ul') || trimmed.startsWith('<li')){
      if(inPara){ result += '</p>'; inPara = false; }
      result += trimmed + '\n';
    } else {
      if(!inPara){ result += '<p>'; inPara = true; }
      else { result += ' '; }
      result += trimmed;
    }
  }
  if(inPara) result += '</p>';
  return result;
}

document.addEventListener('DOMContentLoaded',init);
