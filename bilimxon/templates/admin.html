<!DOCTYPE html>
<html lang="uz">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fira+Code:wght@400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<nav class="topbar" id="topbar"></nav>

<div class="admin-layout">
  <!-- SIDEBAR -->
  <div class="admin-sidebar">
    <div style="padding:16px 20px 8px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,0.08);margin-bottom:8px;">
      <img src="/static/images/logo.png" style="height:28px;" onerror="this.style.display='none'">

    </div>
    <div class="admin-nav-section">ASOSIY</div>
    <div class="admin-nav-item active" data-section="stats" onclick="showSection('stats')">
      <span class="nav-icon">📊</span> Statistika
    </div>
    <div class="admin-nav-item" data-section="users" onclick="showSection('users')">
      <span class="nav-icon">👥</span> Foydalanuvchilar
    </div>
    <div class="admin-nav-section">KONTENT</div>
    <div class="admin-nav-item" data-section="courses" onclick="showSection('courses')">
      <span class="nav-icon">📚</span> Kurslar
    </div>
    <div class="admin-nav-item" data-section="structure" onclick="showSection('structure')">
      <span class="nav-icon">🗂️</span> Bob & Mavzular
    </div>
    <div class="admin-nav-item" data-section="games" onclick="showSection('games')">
      <span class="nav-icon">🎮</span> O'yinlar
    </div>
    <div class="admin-nav-item" data-section="tickets" onclick="showSection('tickets')">
      <span class="nav-icon">🎫</span> Murojaatlar
    </div>
    <div class="admin-nav-item" data-section="vacancies" onclick="showSection('vacancies')">
      <span class="nav-icon">💼</span> Vakansiyalar
    </div>
    <div class="admin-nav-item" data-section="store" onclick="showSection('store')">
      <span class="nav-icon">🛒</span> Do'kon
    </div>
    <div style="margin-top:auto;padding:16px;border-top:1px solid rgba(255,255,255,0.08);margin-top:32px;">
      <div class="lang-switcher" style="background:rgba(255,255,255,0.1);margin-bottom:12px;">
        <button class="lang-btn" data-lang="uz" style="color:rgba(255,255,255,0.6);">UZ</button>
        <button class="lang-btn" data-lang="ru" style="color:rgba(255,255,255,0.6);">RU</button>
      </div>

        🏠 Saytga qaytish

  <div class="admin-main" id="adminMain">

  </div>
</div>

<script src="/static/js/i18n.js"></script>
<script src="/static/js/app.js"></script>
<script>
let currentSection = 'stats';
let allCourses = [];
let adminRole = 'admin'; // will be set on load

// ── Role-based nav restriction ──
async function initAdminRole() {
  try {
    const me = await getMe();
    adminRole = me.role || 'admin';
    // Hide nav items moderators can't see
    if (adminRole === 'moderator') {
      const modOnly = ['stats','tickets','vacancies'];
      document.querySelectorAll('.admin-nav-item').forEach(el => {
        if (!modOnly.includes(el.dataset.section)) {
          el.style.display = 'none';
        }
      });
    }
  } catch(e) {}
}

// ── Section router ──
function showSection(name) {
  // Moderator restriction
  if (adminRole === 'moderator' && !['stats','tickets','vacancies'].includes(name)) {
    showToast('Bu bo\'limga ruxsat yo\'q','error'); return;
  }
  currentSection = name;
  document.querySelectorAll('.admin-nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.section === name);
  });
  const main = document.getElementById('adminMain');
  main.innerHTML = `<div class="loader"><div class="spinner"></div></div>`;
  const fn = { stats: loadStats, users: loadUsers, courses: loadCourses, structure: loadStructure, games: loadGames, tickets: loadTickets, vacancies: loadVacancies, store: loadAdminStore }[name];
  if (fn) fn();
}

// ── STATS ──

// ── USERS ──
async function loadUsers() {
  document.getElementById('adminMain').innerHTML = '<div class="loader"><div class="spinner"></div></div>';
  let users;
  try { users = await api('/api/admin/users'); }
  catch(e) {
    document.getElementById('adminMain').innerHTML = `<div style="padding:40px;text-align:center;color:#f87171;">⚠️ Xato: ${e.message}<br><button onclick="loadUsers()" style="margin-top:12px;padding:8px 20px;background:#1B3A6B;border:none;border-radius:8px;color:#fff;cursor:pointer;font-family:inherit;">🔄 Qayta</button></div>`;
    return;
  }
  const myUsername = (await getMe().catch(()=>({username:''}))).username || '';
  const roleColor = {admin:'badge-gold', moderator:'badge-navy', student:'', banned:'badge-danger'};
  const roleLabel = {admin:'👑 Admin', moderator:'🛡 Moderator', student:'👤 Talaba', banned:'🚫 Banned'};
  document.getElementById('adminMain').innerHTML = `
    <div class="admin-section-title">
      👥 Foydalanuvchilar
      <span class="badge badge-navy">${users.length} ta</span>
    </div>
    <div class="admin-table-wrap">
      <table class="admin-table">
        <thead><tr>
          <th>#</th><th>Ism</th><th>Login</th><th>Bal</th>
          <th>Rol</th><th>Sana</th><th>Boshqaruv</th>
        </tr></thead>
        <tbody>
          ${users.map((u, i) => `
            <tr>
              <td>${i+1}</td>
              <td>
                <strong>${u.full_name||'—'}</strong>
                ${u.has_tick?'<span style="font-size:.7rem;color:#3B82F6;">✓</span>':''}
              </td>
              <td><code style="background:var(--gray-100);padding:2px 6px;border-radius:4px;font-size:.8rem;">${u.username}</code></td>
              <td style="color:var(--gold);font-weight:700;">⭐ ${u.points||0}</td>
              <td>
                <span class="badge ${roleColor[u.role]||''}">
                  ${roleLabel[u.role]||u.role}
                </span>
              </td>
              <td style="color:var(--gray-400);font-size:.78rem;">${(u.created_at||'').slice(0,10)||'—'}</td>
              <td>
                <div style="display:flex;gap:4px;flex-wrap:wrap;">
                  ${u.role === 'admin' && u.username === myUsername ? '<span style="color:var(--gray-400);font-size:.75rem;">Asosiy Admin</span>' : `
                    <select onchange="setRole(${u.id},this.value,this)"
                      style="padding:3px 6px;border-radius:6px;border:1px solid var(--gray-200);font-size:.75rem;cursor:pointer;">
                      <option value="student" ${u.role==='student'?'selected':''}>👤 Talaba</option>
                      <option value="moderator" ${u.role==='moderator'?'selected':''}>🛡 Moderator</option>
                      <option value="admin" ${u.role==='admin'?'selected':''}>👑 Admin</option>
                    </select>
                    <button class="btn btn-sm ${u.role==='banned'?'btn-success':'btn-danger'}"
                      onclick="toggleBan(${u.id},'${u.username}',${u.role==='banned'?1:0})"
                      style="font-size:.72rem;padding:3px 8px;">
                      ${u.role==='banned'?'✅ Unban':'🚫 Ban'}
                    </button>
                    <button class="btn btn-outline btn-sm" onclick="deleteUser(${u.id},'${u.username}')"
                      style="font-size:.72rem;padding:3px 8px;">🗑️</button>
                  ` : '<span style="color:var(--gray-400);font-size:.75rem;">Asosiy Admin</span>'}
                </div>
              </td>
            </tr>`).join('')}
        </tbody>
      </table>
    </div>`;
}

async function setRole(uid, role, selectEl) {
  try {
    await api(`/api/admin/users/${uid}/role`, {method:'POST', body:JSON.stringify({role})});
    showToast(`Rol o'zgartirildi: ${role}`, 'success');
    loadUsers();
  } catch(e) {
    showToast(e.message, 'error');
    loadUsers();
  }
}

async function toggleBan(uid, username, isBanned) {
  const action = isBanned ? 'unban' : 'ban';
  if (!confirm(`"${username}" ni ${action} qilasizmi?`)) return;
  try {
    await api(`/api/admin/users/${uid}/ban`, {method:'POST', body:JSON.stringify({banned: isBanned?0:1})});
    showToast(isBanned ? 'Unban qilindi' : 'Ban qilindi', 'success');
    loadUsers();
  } catch(e) { showToast(e.message, 'error'); }
}

async function deleteUser(id, username) {
  const ok = await confirmDialog(`"${username}" foydalanuvchisini o'chirishni tasdiqlaysizmi?`);
  if (!ok) return;
  try {
    await api(`/api/admin/users/${id}`, { method: 'DELETE' });
    showToast('O\'chirildi', 'success');
    loadUsers();
  } catch (e) { showToast(e.message, 'error'); }
}

// ── COURSES ──
async function loadCourses() {
  allCourses = await api('/api/admin/courses');
  document.getElementById('adminMain').innerHTML = `
    <div class="admin-section-title">
      📚 Kurslar
      <button class="btn btn-primary btn-sm" onclick="openCourseModal()">+ Kurs Qo'shish</button>
    </div>
    <div class="admin-table-wrap">
      <table class="admin-table">
        <thead><tr>
          <th>Icon</th><th>Nomi (UZ)</th><th>Nomi (RU)</th><th>Bob</th>
          <th>Mavzu</th><th>Holat</th><th>Amal</th>
        </tr></thead>
        <tbody>
          ${allCourses.map(c => `
            <tr>
              <td><span style="font-size:1.4rem;">${c.icon}</span></td>
              <td><strong>${c.title_uz}</strong></td>
              <td style="color:var(--gray-400);">${c.title_ru || '—'}</td>
              <td><span class="badge badge-navy">${c.bob_count}</span></td>
              <td><span class="badge badge-info">${c.mavzu_count}</span></td>
              <td><span class="badge ${c.is_active ? 'badge-success' : ''}" style="${!c.is_active ? 'background:#FEE2E2;color:#991B1B;' : ''}">${c.is_active ? '✅ Faol' : '❌ Yopiq'}</span></td>
              <td style="display:flex;gap:6px;">
                <button class="btn btn-outline btn-sm" onclick="openCourseModal(${JSON.stringify(c).replace(/"/g,'&quot;')})">✏️</button>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
      <div class="form-group" style="grid-column:1/-1;">
        <label class="form-label">Slug (URL)</label>
        <input class="form-control" id="cSlug" value="${course?.slug || ''}" ${isEdit ? 'disabled' : ''} placeholder="masalan: react-basics">
      </div>
      <div class="form-group">
        <label class="form-label">Nomi (UZ)</label>

      </div>
      <div class="form-group" style="grid-column:1/-1;">
        <label class="form-label">Tavsif (UZ)</label>
        <textarea class="form-control" id="cDescUz" rows="2">${course?.desc_uz || ''}</textarea>
      </div>
      <div class="form-group" style="grid-column:1/-1;">
        <label class="form-label">Tavsif (RU)</label>
        <textarea class="form-control" id="cDescRu" rows="2">${course?.desc_ru || ''}</textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Icon (emoji)</label>
        <input class="form-control" id="cIcon" value="${course?.icon || '📚'}">
      </div>
      <div class="form-group">
        <label class="form-label">Rang (hex)</label>
        <input class="form-control" id="cColor" type="color" value="${course?.color || '#1B2A4A'}">
      </div>
      <div class="form-group">
        <label class="form-label">Daraja (UZ)</label>
        <select class="form-control" id="cLevelUz">
          ${["Boshlang'ich","O'rta","Ilg'or"].map(l => `<option ${course?.level_uz===l?'selected':''}>${l}</option>`).join('')}
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Daraja (RU)</label>
        <select class="form-control" id="cLevelRu">
          ${['Начальный','Средний','Продвинутый'].map(l => `<option ${course?.level_ru===l?'selected':''}>${l}</option>`).join('')}
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Davomiyligi</label>
        <input class="form-control" id="cDuration" value="${course?.duration || '10 soat'}">
      </div>
      <div class="form-group">
        <label class="form-label">Tartib raqami</label>
        <input class="form-control" id="cSort" type="number" value="${course?.sort_order || 99}">
      </div>
      ${isEdit ? `
      <div class="form-group" style="grid-column:1/-1;">
        <label class="form-label">Holat</label>
        <select class="form-control" id="cActive">
          <option value="1" ${course?.is_active?'selected':''}>✅ Faol</option>
          <option value="0" ${!course?.is_active?'selected':''}>❌ Yopiq</option>
        </select>
      </div>` : ''}
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline modal-close">Bekor qilish</button>
      <button class="btn btn-primary" onclick="saveCourse('${course?.slug || ''}', ${isEdit})">💾 Saqlash</button>
    </div>`;

  openModal(html);

async function saveCourse(slug, isEdit) {

    slug:        document.getElementById('cSlug')?.value,
    title_uz:    document.getElementById('cTitleUz').value,
    title_ru:    document.getElementById('cTitleRu').value,
    desc_uz:     document.getElementById('cDescUz').value,

  let html = '';
  for (const c of allCourses) {
    const bobs = await api(`/api/admin/bobs/${c.slug}`);
    html += `
      <div class="tree-course" id="tc-${c.slug}">
        <div class="tree-course-header" onclick="toggleTree('tc-${c.slug}')">
          <span class="tree-chevron">▶</span>

          <strong>${c.title_uz}</strong>
          <span class="badge badge-navy" style="margin-left:8px;">${c.bob_count} bob</span>
          <span class="badge badge-info" style="margin-left:4px;">${c.mavzu_count} mavzu</span>
          <button class="btn btn-primary btn-sm" style="margin-left:auto;" onclick="event.stopPropagation();openBobModal('${c.slug}')">+ Bob</button>

          ${bobs.length === 0 ? '<p style="color:var(--gray-400);font-size:0.85rem;padding:8px 0;">Bob yo\'q. Bob qo\'shing.</p>' : ''}
          ${bobs.map(b => `
            <div class="tree-bob">
              <div class="tree-bob-header">
                <span>📂</span> ${b.title_uz}
                <span class="badge badge-navy" style="margin-left:6px;">${b.mavzu_count} mavzu</span>
                <button class="btn btn-outline btn-sm" style="margin-left:auto;margin-right:4px;" onclick="openBobModal('${c.slug}',${JSON.stringify(b).replace(/"/g,'&quot;')})">✏️</button>
                <button class="btn btn-danger btn-sm btn-icon" onclick="deleteBob(${b.id})">🗑️</button>
                <button class="btn btn-gold btn-sm" style="margin-left:8px;" onclick="openMavzuModal(${b.id},'${c.slug}')">+ Mavzu</button>
              </div>
              <div id="mavzu-list-${b.id}">
                <div class="loader" style="padding:8px;"><div class="spinner" style="width:20px;height:20px;border-width:2px;"></div></div>
              </div>
            </div>
          `).join('')}
        </div>
      </div>`;
  }
  tree.innerHTML = html;

  // Load mavzular for each bob
  for (const c of allCourses) {
    const bobs = await api(`/api/admin/bobs/${c.slug}`);
    for (const b of bobs) {
      const mavzular = await api(`/api/admin/mavzular/${b.id}`);
      const el = document.getElementById(`mavzu-list-${b.id}`);
      if (!el) continue;
      el.innerHTML = mavzular.length === 0
        ? '<p style="color:var(--gray-400);font-size:0.8rem;padding:4px 0;">Mavzu yo\'q</p>'
        : mavzular.map(m => `
          <div class="tree-mavzu">
            <span>📄</span>
            <span style="flex:1;font-size:0.85rem;">${m.title_uz}</span>
            ${m.quiz_count > 0 ? `<span class="badge badge-gold">${m.quiz_count} test</span>` : ''}
            ${m.video_url ? '<span class="badge badge-navy">🎬</span>' : ''}
            <button class="btn btn-outline btn-sm btn-icon" onclick="openMavzuModal(${b.id},'${c.slug}',${JSON.stringify(m).replace(/"/g,'&quot;')})">✏️</button>
            <button class="btn btn-outline btn-sm btn-icon" onclick="openQuizManager(${m.id},'${m.title_uz}')">📝</button>
            <button class="btn btn-outline btn-sm btn-icon" onclick="openVideoUpload(${m.id},'${m.title_uz}')">🎬</button>
            <button class="btn btn-danger btn-sm btn-icon" onclick="deleteMavzu(${m.id})">🗑️</button>
          </div>`).join('');
    }
  }
}

async function loadInlineQuizList(mavzuId, title) {
  const el = document.getElementById('inlineQuizList');
  if (!el) return;
  try {
    const qs = await api(`/api/admin/quiz/${mavzuId}`);
    if (!qs.length) {
      el.innerHTML = '<p style="color:var(--gray-400);font-size:0.82rem;padding:4px 0;">Hali savol yo\'q. Savol qo\'shing!</p>';
      return;
    }
    el.innerHTML = qs.map((q, i) => `
      <div style="border:1.5px solid var(--gray-200);border-radius:10px;padding:10px 12px;margin-bottom:8px;background:var(--gray-50);">
        <div style="font-weight:600;font-size:0.85rem;margin-bottom:6px;color:var(--navy);">${i+1}. ${q.question_uz}</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:2px 8px;margin-bottom:8px;">
          ${JSON.parse(q.options_uz).map((o, oi) => `
            <div style="font-size:0.78rem;color:${oi===q.correct_idx?'var(--success)':'var(--gray-500)'};display:flex;align-items:center;gap:4px;">
              <span style="font-size:0.7rem;">${oi===q.correct_idx?'✅':'○'}</span> ${o}
            </div>`).join('')}
        </div>
        <div style="display:flex;gap:6px;">
          <button class="btn btn-outline btn-sm" style="font-size:.72rem;padding:3px 9px;" onclick="openQuizFormInline(${mavzuId},'${title}',${JSON.stringify(q).replace(/\"/g,'&quot;')},${q.id})">✏️ Tahrirlash</button>
          <button class="btn btn-danger btn-sm" style="font-size:.72rem;padding:3px 9px;" onclick="deleteQuizInline(${q.id},${mavzuId},'${title}')">🗑️</button>
        </div>
      </div>`).join('');
  } catch(e) {
    el.innerHTML = `<p style="color:var(--danger);font-size:0.82rem;">${e.message}</p>`;
  }
}

// ── VIDEO DRAG & DROP in Mavzu Modal ──
function handleVideoDrop(event, key, mavzuId) {
  event.preventDefault();
  const dropEl = document.getElementById(`videoDrop_${key}`);
  dropEl.style.borderColor = 'var(--gray-200)';
  dropEl.style.background = 'var(--gray-50)';
  const file = event.dataTransfer.files[0];
  if (!file || !file.type.startsWith('video/')) {
    showToast('Faqat video fayl qabul qilinadi!', 'error');
    return;
  }
  startVideoUploadInModal(file, key, mavzuId);
}

function handleVideoSelect(input, key, mavzuId) {
  const file = input.files[0];
  if (!file) return;
  startVideoUploadInModal(file, key, mavzuId);
}

async function startVideoUploadInModal(file, key, mavzuId) {
  const content = document.getElementById(`videoDropContent_${key}`);
  const progress = document.getElementById(`videoUploadProgress_${key}`);
  const fill = document.getElementById(`videoFill_${key}`);
  const status = document.getElementById(`videoStatus_${key}`);

  content.innerHTML = `
    <div style="font-size:1.5rem;margin-bottom:6px;">⏳</div>
    <div style="font-weight:700;color:var(--navy);font-size:0.88rem;">${file.name}</div>
    <div style="font-size:0.73rem;color:var(--gray-400);margin-top:3px;">${(file.size/1024/1024).toFixed(1)} MB — Yuklanmoqda...</div>`;
  progress.style.display = '';
  fill.style.width = '0%';

  // If no mavzuId yet (new mavzu), just store file for later
  if (!mavzuId) {
    // Store file in memory, show preview
    window._pendingVideoFile = file;
    let prog = 0;
    const fake = setInterval(() => {
      prog = Math.min(prog + 20, 90);
      fill.style.width = prog + '%';
    }, 80);
    setTimeout(() => {
      clearInterval(fake);
      fill.style.width = '100%';
      status.textContent = '✅ Tayyor — Mavzu saqlanganida yuklanadi';
      content.innerHTML = `
        <div style="font-size:1.6rem;margin-bottom:6px;">🎬</div>
        <div style="font-weight:700;color:var(--success);font-size:0.88rem;">Tayyor: ${file.name} ✓</div>
        <div style="font-size:0.72rem;color:var(--gray-400);margin-top:3px;">${(file.size/1024/1024).toFixed(1)} MB</div>`;
    }, 500);
    return;
  }

  // Upload immediately
  let prog = 0;
  const interval = setInterval(() => {
    prog = Math.min(prog + Math.random() * 12, 88);
    fill.style.width = prog + '%';
  }, 200);

  try {
    const form = new FormData();
    form.append('video', file);
    const res = await fetch(`/api/admin/upload-video/${mavzuId}`, { method:'POST', body:form });
    const data = await res.json();
    clearInterval(interval);
    fill.style.width = '100%';
    if (data.success) {
      document.getElementById('mVideoUrl').value = data.video_url;
      status.textContent = '✅ Muvaffaqiyatli yuklandi!';
      content.innerHTML = `
        <div style="font-size:1.6rem;margin-bottom:6px;">🎬</div>
        <div style="font-weight:700;color:var(--success);font-size:0.88rem;">Yuklandi: ${file.name} ✓</div>
        <div style="font-size:0.72rem;color:var(--gray-400);margin-top:3px;">${(file.size/1024/1024).toFixed(1)} MB • Yangilash uchun yana tashlang</div>`;
      showToast('Video yuklandi!', 'success');
    } else {
      throw new Error(data.error || 'Xatolik');
    }
  } catch(e) {
    clearInterval(interval);
    fill.style.width = '0%';
    status.textContent = '❌ Xatolik: ' + e.message;
    content.innerHTML = `
      <div style="font-size:1.6rem;margin-bottom:6px;">❌</div>
      <div style="font-weight:700;color:var(--danger);font-size:0.88rem;">Xatolik yuz berdi</div>
      <div style="font-size:0.72rem;color:var(--gray-400);margin-top:3px;">Qayta urinib ko'ring</div>`;
    showToast(e.message, 'error');
  }
}


async function saveMavzu(bobId, courseSlug, mavzuId, isEdit) {
  const data = {
    bob_id: bobId, course_slug: courseSlug,
    title_uz:    document.getElementById('mTitleUz').value.trim(),
    title_ru:    document.getElementById('mTitleRu').value.trim(),
    content_uz:  document.getElementById('mContentUz')?.value || '',
    content_ru:  document.getElementById('mContentRu')?.value || '',
    code_example:document.getElementById('mCodeExample')?.value || '',
    sort_order:  parseInt(document.getElementById('mSort').value) || 1,
  };
  try {
    let savedId = mavzuId;
    if (isEdit) {
      await api(`/api/admin/mavzular/${mavzuId}`, { method:'PUT', body:JSON.stringify(data) });
    } else {
      const res = await api('/api/admin/mavzular', { method:'POST', body:JSON.stringify(data) });
      savedId = res.id;
    }
    // Upload pending video file if new mavzu had one dragged in
    if (!isEdit && window._pendingVideoFile && savedId) {
      const form = new FormData();
      form.append('video', window._pendingVideoFile);
      await fetch(`/api/admin/upload-video/${savedId}`, { method:'POST', body:form });
      window._pendingVideoFile = null;
    }
    showToast('Saqlandi!', 'success');
    document.querySelector('.modal-overlay')?.remove();
    loadStructure();
  } catch(e) { showToast(e.message, 'error'); }
}

async function uploadVideo(mavzuId) {

  const btn = document.getElementById('uploadBtn');
  btn.disabled = true;
  btn.textContent = 'Yuklanmoqda...';
  document.getElementById('uploadProgress').style.display = '';

  // Simulate progress animation
  let prog = 0;
  const interval = setInterval(() => {
    prog = Math.min(prog + Math.random() * 15, 90);
    document.getElementById('uploadFill').style.width = prog + '%';
  }, 200);

  try {
    const form = new FormData();
    form.append('video', file);
    const res = await fetch(`/api/admin/upload-video/${mavzuId}`, { method:'POST', body:form });

    } else {
      throw new Error(data.error);
    }
  } catch (e) {
    clearInterval(interval);
    showToast(e.message, 'error');
    btn.disabled = false;
    btn.textContent = '⬆️ Yuklash';
  }
}

// ── MAVZU VIDEO UPLOAD (3 TIL) ──
async function uploadMavzuVideo(input, mavzuId, lang) {
  const file = input.files[0];
  if (!file) return;
  if (!mavzuId) { showToast('Avval mavzuni saqlang!', 'error'); return; }

  const mid = mavzuId;
  const progEl = document.getElementById(`vprog_${lang}_${mid}`);
  const barEl  = document.getElementById(`vbar_${lang}_${mid}`);
  const statusEl = document.getElementById(`vstatus_${lang}_${mid}`);

  if (progEl) progEl.style.display = '';
  if (statusEl) statusEl.textContent = 'Yuklanmoqda...';
  if (barEl) barEl.style.width = '0%';

  // Animate progress bar
  let fakeProgress = 0;
  const interval = setInterval(() => {
    fakeProgress = Math.min(fakeProgress + Math.random() * 15, 85);
    if (barEl) barEl.style.width = fakeProgress + '%';
  }, 300);

  try {
    const fd = new FormData();
    fd.append('video', file);
    fd.append('lang', lang);
    const res = await fetch(`/api/admin/upload-video/${mid}`, { method: 'POST', body: fd });
    const d = await res.json();
    clearInterval(interval);
    if (d.success) {
      if (barEl) barEl.style.width = '100%';
      if (statusEl) {
        const langLabel = lang==='uz'?'O\'zbekcha':lang==='ru'?'Ruscha':'Inglizcha';
        statusEl.innerHTML = `<span style="color:#4ade80;">✅ ${langLabel} video yuklandi: ${file.name}</span>`;
      }
      showToast(`${lang.toUpperCase()} video yuklandi ✅`, 'success');
    } else {
      clearInterval(interval);
      if (statusEl) statusEl.innerHTML = `<span style="color:#f87171;">❌ ${d.error}</span>`;
      showToast(d.error || 'Xato', 'error');
    }
  } catch(e) {
    clearInterval(interval);
    if (statusEl) statusEl.innerHTML = `<span style="color:#f87171;">❌ ${e.message}</span>`;
    showToast(e.message, 'error');
  }
}

// ── TEXT FORMATTER (Markdown shortcuts) ──
function fmtText(id, cmd) {
  const ta = document.getElementById(id);
  if (!ta) return;
  const start = ta.selectionStart;
  const end = ta.selectionEnd;
  const sel = ta.value.substring(start, end) || 'matn';
  let insert = '';
  switch(cmd) {
    case 'B':     insert = `**${sel}**`; break;
    case 'I':     insert = `*${sel}*`; break;
    case 'H2':    insert = `\n## ${sel}\n`; break;
    case 'H3':    insert = `\n### ${sel}\n`; break;
    case '• List':insert = `\n- ${sel}\n`; break;
    case 'Code':  insert = `\`${sel}\``; break;
    default:      insert = sel;
  }
  ta.value = ta.value.substring(0, start) + insert + ta.value.substring(end);
  ta.focus();
  ta.selectionStart = start + insert.length;
  ta.selectionEnd = start + insert.length;
}

          🖼️ Rasm<input type="file" accept="image/*" style="display:none;" onchange="uploadStoreImg(${it.id},this)">
        </label>
        <button onclick="deleteStoreItem(${it.id})" style="padding:7px 10px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);border-radius:8px;color:#f87171;cursor:pointer;font-family:inherit;font-size:.78rem;">🗑️</button>
      </div>
    </div>`).join('');
}

function openAddStoreItem(){
  const html=`<div style="position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:9999;display:flex;align-items:center;justify-content:center;">
  <div style="background:#161b22;border:1px solid #21262d;border-radius:16px;padding:24px;width:380px;max-width:95vw;">
    <div style="font-weight:800;color:#fff;font-size:1rem;margin-bottom:16px;">+ Yangi tovar qo'shish</div>
    <label style="font-size:.75rem;color:#666;font-weight:700;display:block;margin-bottom:4px;">Nomi (UZ)</label>
    <input id="siName" placeholder="Tovar nomi..." style="width:100%;background:#0d1117;border:1.5px solid #21262d;border-radius:8px;padding:9px 12px;color:#fff;font-family:inherit;font-size:.85rem;outline:none;box-sizing:border-box;margin-bottom:10px;">
    <label style="font-size:.75rem;color:#666;font-weight:700;display:block;margin-bottom:4px;">Tavsif</label>
    <input id="siDesc" placeholder="Qisqa tavsif..." style="width:100%;background:#0d1117;border:1.5px solid #21262d;border-radius:8px;padding:9px 12px;color:#fff;font-family:inherit;font-size:.85rem;outline:none;box-sizing:border-box;margin-bottom:10px;">
    <label style="font-size:.75rem;color:#666;font-weight:700;display:block;margin-bottom:4px;">Narx (ball)</label>
    <input id="siPrice" type="number" value="100" style="width:100%;background:#0d1117;border:1.5px solid #21262d;border-radius:8px;padding:9px 12px;color:#fff;font-family:inherit;font-size:.85rem;outline:none;box-sizing:border-box;margin-bottom:10px;">
    <label style="font-size:.75rem;color:#666;font-weight:700;display:block;margin-bottom:4px;">Noyoblik</label>
    <select id="siRarity" style="width:100%;background:#0d1117;border:1.5px solid #21262d;border-radius:8px;padding:9px 12px;color:#fff;font-family:inherit;font-size:.85rem;outline:none;box-sizing:border-box;margin-bottom:16px;">
      <option value="common">Common</option><option value="rare">Rare</option><option value="epic">Epic</option><option value="legendary">Legendary</option>
    </select>
    <div style="display:flex;gap:8px;">
      <button onclick="this.closest('[style*=fixed]').remove()" style="flex:1;padding:10px;background:rgba(255,255,255,.06);border:1px solid #21262d;border-radius:8px;color:#aaa;cursor:pointer;font-family:inherit;">Bekor</button>
      <button onclick="submitAddStoreItem(this)" style="flex:2;padding:10px;background:linear-gradient(135deg,#C9A84C,#8B6914);border:none;border-radius:8px;color:#fff;font-weight:800;cursor:pointer;font-family:inherit;">✅ Qo'shish</button>
    </div>
  </div></div>`;
  document.body.insertAdjacentHTML('beforeend',html);
}

async function submitAddStoreItem(btn){
  const name=document.getElementById('siName').value.trim();
  const desc=document.getElementById('siDesc').value.trim();
  const price=parseInt(document.getElementById('siPrice').value)||100;
  const rarity=document.getElementById('siRarity').value;
  if(!name){showToast('Nom kiriting!','error');return;}
  btn.disabled=true;btn.textContent='⏳...';
  try{
    await api('/api/admin/store/items',{method:'POST',body:JSON.stringify({name_uz:name,name_ru:name,desc_uz:desc,desc_ru:desc,price_points:price,rarity,item_type:'cosmetic'})});
    showToast('Tovar qo\'shildi ✅','success');
    btn.closest('[style*=fixed]').remove();
    loadAdminStore();
  }catch(e){showToast(e.message,'error');btn.disabled=false;btn.textContent='✅ Qo\'shish';}
}

function editStoreItem(id,name,desc,price,rarity,active){
  const html=`<div style="position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:9999;display:flex;align-items:center;justify-content:center;">
  <div style="background:#161b22;border:1px solid #21262d;border-radius:16px;padding:24px;width:380px;max-width:95vw;">
    <div style="font-weight:800;color:#fff;font-size:1rem;margin-bottom:16px;">✏️ Tovanni tahrirlash</div>
    <label style="font-size:.75rem;color:#666;font-weight:700;display:block;margin-bottom:4px;">Nomi</label>
    <input id="eiName" value="${name}" style="width:100%;background:#0d1117;border:1.5px solid #21262d;border-radius:8px;padding:9px 12px;color:#fff;font-family:inherit;font-size:.85rem;outline:none;box-sizing:border-box;margin-bottom:10px;">
    <label style="font-size:.75rem;color:#666;font-weight:700;display:block;margin-bottom:4px;">Tavsif</label>
    <input id="eiDesc" value="${desc}" style="width:100%;background:#0d1117;border:1.5px solid #21262d;border-radius:8px;padding:9px 12px;color:#fff;font-family:inherit;font-size:.85rem;outline:none;box-sizing:border-box;margin-bottom:10px;">
    <label style="font-size:.75rem;color:#666;font-weight:700;display:block;margin-bottom:4px;">Narx (ball)</label>
    <input id="eiPrice" type="number" value="${price}" style="width:100%;background:#0d1117;border:1.5px solid #21262d;border-radius:8px;padding:9px 12px;color:#fff;font-family:inherit;font-size:.85rem;outline:none;box-sizing:border-box;margin-bottom:10px;">
    <label style="font-size:.75rem;color:#666;font-weight:700;display:block;margin-bottom:4px;">Noyoblik</label>
    <select id="eiRarity" style="width:100%;background:#0d1117;border:1.5px solid #21262d;border-radius:8px;padding:9px 12px;color:#fff;font-family:inherit;font-size:.85rem;outline:none;box-sizing:border-box;margin-bottom:10px;">
      <option value="common" ${rarity==='common'?'selected':''}>Common</option><option value="rare" ${rarity==='rare'?'selected':''}>Rare</option><option value="epic" ${rarity==='epic'?'selected':''}>Epic</option><option value="legendary" ${rarity==='legendary'?'selected':''}>Legendary</option>
    </select>
    <label style="display:flex;align-items:center;gap:8px;cursor:pointer;margin-bottom:16px;">
      <input type="checkbox" id="eiActive" ${active?'checked':''} style="width:16px;height:16px;">
      <span style="color:#aaa;font-size:.82rem;">Faol (do'konda ko'rinadi)</span>
    </label>
    <div style="display:flex;gap:8px;">
      <button onclick="this.closest('[style*=fixed]').remove()" style="flex:1;padding:10px;background:rgba(255,255,255,.06);border:1px solid #21262d;border-radius:8px;color:#aaa;cursor:pointer;font-family:inherit;">Bekor</button>
      <button onclick="submitEditStoreItem(${id},this)" style="flex:2;padding:10px;background:linear-gradient(135deg,#C9A84C,#8B6914);border:none;border-radius:8px;color:#fff;font-weight:800;cursor:pointer;font-family:inherit;">💾 Saqlash</button>
    </div>
  </div></div>`;
  document.body.insertAdjacentHTML('beforeend',html);
}

async function submitEditStoreItem(id,btn){
  const name=document.getElementById('eiName').value.trim();
  const desc=document.getElementById('eiDesc').value.trim();
  const price=parseInt(document.getElementById('eiPrice').value)||100;
  const rarity=document.getElementById('eiRarity').value;
  const active=document.getElementById('eiActive').checked?1:0;
  btn.disabled=true;btn.textContent='⏳...';
  try{
    await api(`/api/admin/store/items/${id}`,{method:'PUT',body:JSON.stringify({name_uz:name,name_ru:name,desc_uz:desc,desc_ru:desc,price_points:price,rarity,is_active:active})});
    showToast('Saqlandi ✅','success');
    btn.closest('[style*=fixed]').remove();
    loadAdminStore();
  }catch(e){showToast(e.message,'error');btn.disabled=false;btn.textContent='💾 Saqlash';}
}

async function uploadStoreImg(id,input){
  const file=input.files[0];if(!file)return;
  const fd=new FormData();fd.append('image',file);
  try{
    const r=await fetch(`/api/admin/store/items/${id}/image`,{method:'POST',body:fd});
    const d=await r.json();
    if(d.success){showToast('Rasm yuklandi ✅','success');loadAdminStore();}
    else showToast('Xato','error');
  }catch(e){showToast(e.message,'error');}
}

async function deleteStoreItem(id){
  if(!confirm('Tovanni o\'chirmoqchimisiz?'))return;
  await api(`/api/admin/store/items/${id}`,{method:'DELETE'});
  showToast('O\'chirildi','success');
  loadAdminStore();
}

document.addEventListener('DOMContentLoaded', () => {
  initAdminRole().then(() => loadStats());
});
</script>
