<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Bilimxon — Guruhga Taklif</title>
  <link rel="icon" href="/static/images/logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
  <style>
    body{font-family:'Outfit',sans-serif;background:#f0f2f5;display:flex;align-items:center;justify-content:center;min-height:100vh;}
    .invite-card{background:white;border-radius:20px;padding:40px;max-width:420px;width:90%;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.12);}
    .invite-icon{font-size:3.5rem;margin-bottom:16px;}
    .invite-name{font-size:1.6rem;font-weight:900;color:var(--navy);margin-bottom:6px;}
    .invite-meta{color:var(--gray-400);font-size:.85rem;margin-bottom:24px;}
    .invite-btn{width:100%;padding:14px;border-radius:12px;font-size:1rem;font-weight:800;cursor:pointer;border:none;background:linear-gradient(135deg,#1B3A6B,#C9A84C);color:white;transition:.2s;}
    .invite-btn:hover{opacity:.9;}
    .invite-badge{display:inline-block;padding:3px 12px;border-radius:999px;font-size:.75rem;font-weight:800;background:#e8f5e9;color:#2e7d32;margin-bottom:10px;}
    .study-badge{background:#e3f2fd;color:#1565c0;}
  </style>
</head>
<body>
<nav class="topbar" id="topbar"></nav>
<div class="invite-card">
  <div id="inviteContent">
    <div class="loader"><div class="spinner" style="margin:0 auto;"></div></div>
  </div>
</div>

<script src="/static/js/i18n.js"></script>
<script src="/static/js/app.js"></script>
<script>
const code = '{{ code }}';

async function loadInvite() {
  try {
    const g = await api(`/api/invite/${code}`);
    const catLabel = g.group_category === 'study' ? '📚 Study Guruh' : '👥 Oddiy Guruh';
    const catClass = g.group_category === 'study' ? 'study-badge' : '';
    document.getElementById('inviteContent').innerHTML = `
      <div class="invite-icon">${g.avatar ? `<img src="${g.avatar}" style="width:72px;height:72px;border-radius:16px;object-fit:cover;">` : '💬'}</div>
      <span class="invite-badge ${catClass}">${catLabel}</span>
      <div class="invite-name">${g.name}</div>
      <div class="invite-meta">
        👥 ${g.member_count} a'zo · ${g.is_public ? '🌍 Ochiq' : '🔒 Yopiq'}<br>
        ${g.description ? `<span style="margin-top:4px;display:block;">${g.description}</span>` : ''}
      </div>
      <button class="invite-btn" onclick="joinGroup()">➕ Guruhga Qo'shilish</button>
      <div style="margin-top:12px;"><a href="/groups" style="color:var(--gray-400);font-size:.82rem;">Bekor qilish</a></div>`;
  } catch(e) {
    document.getElementById('inviteContent').innerHTML = `
      <div class="invite-icon">❌</div>
      <div class="invite-name" style="color:#EF4444;">Taklif topilmadi</div>
      <div class="invite-meta">Bu taklif havolasi yaroqsiz yoki muddati o'tgan.</div>
      <a href="/groups" class="invite-btn" style="display:block;text-decoration:none;">← Guruhlarga qaytish</a>`;
  }
}

async function joinGroup() {
  try {
    const me = await getMe();
    if(!me.logged_in) { window.location.href = '/login?next='+encodeURIComponent(window.location.href); return; }
    const res = await api(`/api/invite/${code}/join`, {method:'POST'});
    if(res.success) {
      showToast("🎉 Guruhga qo'shildingiz!", 'success');
      setTimeout(() => window.location.href = `/group/${res.slug}`, 1000);
    }
  } catch(e) {
    showToast(e.message, 'error');
  }
}

document.addEventListener('DOMContentLoaded', loadInvite);
</script>
</body>
</html>
