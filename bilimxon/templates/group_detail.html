<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Bilimxon — Guruh</title>
  <link rel="icon" href="/static/images/logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
  <style>
body{font-family:'Outfit',sans-serif;background:#1a1f2e;}
.group-layout{display:grid;grid-template-columns:1fr 280px;height:calc(100vh - var(--topbar-h));padding-top:var(--topbar-h);}
.group-main{display:flex;flex-direction:column;overflow:hidden;background:#0e1621;}
.group-header{background:#17212b;border-bottom:1px solid rgba(255,255,255,.06);padding:10px 16px;display:flex;align-items:center;gap:10px;}
.g-avatar{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,#1B3A6B,#C9A84C);display:flex;align-items:center;justify-content:center;font-size:1.1rem;font-weight:700;color:white;overflow:hidden;flex-shrink:0;}
.g-avatar img{width:100%;height:100%;object-fit:cover;}
.group-header-name{font-weight:800;color:white;font-size:.95rem;}
.group-header-sub{font-size:.75rem;color:rgba(255,255,255,.4);margin-top:1px;}
.group-header-actions{display:flex;gap:6px;margin-left:auto;}
.g-hbtn{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.07);border:none;color:rgba(255,255,255,.6);cursor:pointer;font-size:.95rem;display:flex;align-items:center;justify-content:center;transition:.15s;}
.g-hbtn:hover{background:rgba(255,255,255,.13);color:white;}
.msgs-area{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:6px;}
.msgs-area::-webkit-scrollbar{width:4px;}
.msgs-area::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:999px;}
/* Messages */
.gmsg{display:flex;gap:8px;align-items:flex-start;max-width:100%;}
.gmsg.mine{flex-direction:row-reverse;}
.gm-av{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#1B3A6B,#C9A84C);display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700;color:white;flex-shrink:0;overflow:hidden;cursor:pointer;}
.gm-av img{width:100%;height:100%;object-fit:cover;}
.gm-bubble{max-width:480px;}
.gm-name{font-size:.7rem;font-weight:700;color:#C9A84C;margin-bottom:3px;}
.gm-text{background:#182533;border-radius:14px;padding:9px 13px;font-size:.875rem;line-height:1.5;color:rgba(255,255,255,.9);}
.gm-text.mine{background:linear-gradient(135deg,#2b5278,#1a3f5c);color:white;}
.gm-time{font-size:.65rem;color:rgba(255,255,255,.3);margin-top:3px;}
/* Media messages */
.gm-img{max-width:260px;border-radius:12px;overflow:hidden;cursor:pointer;}
.gm-img img{width:100%;display:block;}
.gm-video{max-width:280px;border-radius:12px;overflow:hidden;}
.gm-video video{width:100%;display:block;}
.gm-audio{background:#182533;border-radius:12px;padding:10px 14px;display:flex;align-items:center;gap:10px;min-width:200px;}
.gm-audio.mine{background:linear-gradient(135deg,#2b5278,#1a3f5c);}
.gm-audio audio{flex:1;height:32px;}
.gm-sticker{max-width:120px;}
.gm-sticker img{width:100%;}
/* Input area */
.chat-input-area{background:#17212b;border-top:1px solid rgba(255,255,255,.06);padding:10px 14px;}
.input-row{display:flex;gap:8px;align-items:flex-end;}
.chat-input-wrap{flex:1;background:rgba(255,255,255,.07);border-radius:22px;padding:9px 15px;display:flex;align-items:center;}
.chat-input{flex:1;border:none;background:transparent;color:white;font-size:.87rem;font-family:'Outfit',sans-serif;outline:none;resize:none;max-height:100px;}
.chat-input::placeholder{color:rgba(255,255,255,.25);}
.send-btn{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,#2b5278,#1a3f5c);color:white;border:none;font-size:.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.2s;}
.send-btn:hover{transform:scale(1.08);}
/* Attach buttons */
.attach-bar{display:flex;gap:6px;padding:6px 0 0;flex-wrap:wrap;}
.attach-btn{padding:5px 12px;border-radius:20px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);font-size:.75rem;font-weight:600;color:rgba(255,255,255,.5);cursor:pointer;transition:.2s;display:flex;align-items:center;gap:4px;}
.attach-btn:hover{border-color:rgba(201,168,76,.4);color:#C9A84C;}
/* Sidebar */
.group-sidebar{background:#17212b;border-left:1px solid rgba(255,255,255,.06);display:flex;flex-direction:column;overflow:hidden;}
.gsb-tabs{display:flex;border-bottom:1px solid rgba(255,255,255,.06);}
.gsb-tab{flex:1;padding:10px;text-align:center;font-size:.78rem;font-weight:700;color:rgba(255,255,255,.4);cursor:pointer;transition:.15s;border-bottom:2px solid transparent;}
.gsb-tab.active{color:#C9A84C;border-bottom-color:#C9A84C;}
.gsb-content{flex:1;overflow-y:auto;}
.gsb-header{padding:12px 14px;border-bottom:1px solid rgba(255,255,255,.06);font-weight:800;color:rgba(255,255,255,.7);font-size:.88rem;display:flex;align-items:center;justify-content:space-between;}
.member-item{display:flex;align-items:center;gap:8px;padding:9px 12px;cursor:pointer;transition:.2s;}
.member-item:hover{background:rgba(255,255,255,.05);}
.m-av{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#1B3A6B,#C9A84C);display:flex;align-items:center;justify-content:center;font-size:.82rem;font-weight:700;color:white;flex-shrink:0;overflow:hidden;}
.m-av img{width:100%;height:100%;object-fit:cover;}
.m-name{font-size:.84rem;font-weight:600;color:white;}
.m-sub{font-size:.72rem;color:rgba(255,255,255,.35);}
.tick{display:inline-flex;align-items:center;justify-content:center;width:13px;height:13px;background:#3B82F6;border-radius:50%;color:white;font-size:.52rem;}
.role-b{font-size:.6rem;font-weight:700;padding:1px 6px;border-radius:999px;}
.role-owner{background:#FFD700;color:#7A4F00;}.role-admin{background:rgba(59,130,246,.2);color:#60A5FA;}
.group-info-banner{background:linear-gradient(135deg,#0d1b2e,#1B3A6B);color:white;padding:16px;}
/* Settings panel */
.gsettings{padding:14px;}
.gset-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.06);}
.gset-row:last-child{border-bottom:none;}
.gset-label{font-size:.85rem;font-weight:600;color:rgba(255,255,255,.8);}
.gset-sub{font-size:.72rem;color:rgba(255,255,255,.35);margin-top:2px;}
.gset-toggle{position:relative;width:40px;height:22px;cursor:pointer;}
.gset-toggle input{opacity:0;width:0;height:0;}
.gset-slider{position:absolute;inset:0;background:rgba(255,255,255,.12);border-radius:999px;transition:.25s;}
.gset-toggle input:checked+.gset-slider{background:linear-gradient(135deg,#C9A84C,#8B6914);}
.gset-slider::before{content:'';position:absolute;width:18px;height:18px;left:2px;top:2px;background:white;border-radius:50%;transition:.25s;}
.gset-toggle input:checked+.gset-slider::before{transform:translateX(18px);}
/* Recording indicator */
.recording-indicator{display:none;align-items:center;gap:8px;padding:8px 14px;background:rgba(239,68,68,.1);border-radius:10px;margin-bottom:6px;border:1px solid rgba(239,68,68,.2);}
.rec-dot{width:10px;height:10px;border-radius:50%;background:#EF4444;animation:recBlink 1s infinite;}
@keyframes recBlink{0%,100%{opacity:1;}50%{opacity:.3;}}
@media(max-width:768px){.group-sidebar{display:none;}.group-layout{grid-template-columns:1fr;}}
  </style>
</head>
<body>
<nav class="topbar" id="topbar"></nav>
<div class="group-layout">
  <div class="group-main">
    <div class="group-header" id="groupHeader">
      <div class="loader"><div class="spinner" style="width:20px;height:20px;border-width:2px;"></div></div>
    </div>
    <div class="msgs-area" id="msgsArea">
      <div style="text-align:center;padding:40px;"><div class="spinner" style="margin:0 auto;border-color:rgba(255,255,255,.1);border-top-color:#C9A84C;"></div></div>
    </div>
    <div id="inputArea" style="display:none;">
      <div class="chat-input-area">
        <div class="recording-indicator" id="recIndicator">
          <div class="rec-dot"></div>
          <span style="font-size:.8rem;color:#EF4444;font-weight:600;">Ovoz yozilmoqda...</span>
          <button onclick="cancelRecording()" style="margin-left:auto;background:none;border:none;cursor:pointer;font-size:.8rem;color:rgba(255,255,255,.4);">❌ Bekor qilish</button>
        </div>
        <div class="input-row">
          <div class="chat-input-wrap">
            <textarea class="chat-input" id="groupInput" placeholder="Xabar yozing..." rows="1"
              onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
          </div>
          <button class="send-btn" onclick="sendMsg()">➤</button>
        </div>
        <div class="attach-bar">
          <label class="attach-btn" title="Rasm yoki GIF">
            🖼️ Rasm/GIF
            <input type="file" accept="image/*,image/gif" style="display:none;" onchange="uploadMedia(this,'image')">
          </label>
          <label class="attach-btn" title="Video">
            🎬 Video
            <input type="file" accept="video/*" style="display:none;" onchange="uploadMedia(this,'video')">
          </label>
          <label class="attach-btn" title="Sticker (webp)">
            😄 Sticker
            <input type="file" accept="image/webp,image/gif" style="display:none;" onchange="uploadMedia(this,'sticker')">
          </label>
          <button class="attach-btn" id="voiceBtn" onclick="toggleVoice()">🎤 Ovozli xabar</button>
        </div>
      </div>
    </div>
    <div id="joinBar" style="display:none;background:#17212b;border-top:1px solid rgba(255,255,255,.06);padding:12px 16px;text-align:center;">
      <button class="btn btn-primary" onclick="joinGroup()">➕ Guruhga Qo'shilish</button>
    </div>
  </div>

  <div class="group-sidebar">
    <div class="group-info-banner" id="groupInfoBanner"></div>
    <div class="gsb-tabs">
      <div class="gsb-tab active" onclick="showGTab('members',this)">👥 A'zolar</div>
      <div class="gsb-tab" onclick="showGTab('media',this)">🖼️ Media</div>
      <div class="gsb-tab" onclick="showGTab('settings',this)">⚙️ Sozlama</div>
      <div class="gsb-tab" id="modTab" style="display:none;" onclick="showGTab('moderation',this)">🛡️ Mod</div>
    </div>
    <div class="gsb-content">
      <div id="gTabMembers">
        <div class="gsb-header">
          <span>👥 A'zolar</span>
          <span id="memberCount" style="font-size:.75rem;color:rgba(255,255,255,.3);font-weight:500;"></span>
        </div>
        <div id="membersList">
          <div class="loader" style="padding:20px;"><div class="spinner"></div></div>
        </div>
      </div>
      <div id="gTabMedia" style="display:none;">
        <div class="gsb-header"><span>🖼️ Media Fayllar</span></div>
        <div id="mediaList" style="padding:12px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;">
          <div style="padding:20px;text-align:center;color:rgba(255,255,255,.3);font-size:.8rem;grid-column:1/-1;">Media yuklanmoqda...</div>
        </div>
      </div>
      <div id="gTabSettings" style="display:none;">
        <div class="gsb-header"><span>⚙️ Guruh Sozlamalari</span></div>
        <div class="gsettings" id="groupSettingsPanel">
          <div style="padding:20px;text-align:center;color:rgba(255,255,255,.3);font-size:.8rem;">Yuklanmoqda...</div>
        </div>
      </div>
      <div id="gTabModeration" style="display:none;">
        <div class="gsb-header">
          <span>🛡️ Moderatsiya</span>
          <button onclick="openModerationPanel()" style="font-size:.72rem;background:rgba(201,168,76,.12);border:1px solid rgba(201,168,76,.2);color:#C9A84C;border-radius:8px;padding:3px 8px;cursor:pointer;">Ochish</button>
        </div>
        <div style="padding:14px;display:flex;flex-direction:column;gap:8px;">
          <button onclick="inviteByUsername()" style="width:100%;padding:9px;background:rgba(59,130,246,.09);border:1px solid rgba(59,130,246,.2);border-radius:10px;color:#60A5FA;cursor:pointer;font-weight:700;font-size:.8rem;">📨 Username bilan taklif</button>
          <button onclick="showInviteLink()" style="width:100%;padding:9px;background:rgba(34,197,94,.09);border:1px solid rgba(34,197,94,.2);border-radius:10px;color:#4ade80;cursor:pointer;font-weight:700;font-size:.8rem;">🔗 Taklif havolasi</button>
          <button onclick="openModerationPanel()" style="width:100%;padding:9px;background:rgba(201,168,76,.09);border:1px solid rgba(201,168,76,.2);border-radius:10px;color:#C9A84C;cursor:pointer;font-weight:700;font-size:.8rem;">🛡️ A'zolar boshqaruvi</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="/static/js/i18n.js"></script>
<script src="/static/js/app.js"></script>
<script>
const slug=window.location.pathname.split('/').pop();
let groupData=null,myId=null,myRole=null,pollInterval=null,_lastMsgId=0,_groupSSE=null;
let mediaRecorder=null,audioChunks=[],isRecording=false;

async function init(){
  const me=await getMe();
  myId=me.user_id;
  await loadGroup();
  // Delay SSE start slightly so page renders first
  setTimeout(_startGroupSSE, 500);
}

function _startGroupSSE(){
  if(_groupSSE){_groupSSE.close();}
  if(typeof EventSource==='undefined'){
    // Fallback to polling if SSE not supported
    pollInterval=setInterval(loadMessages,3000);
    return;
  }
  try{
    _groupSSE=new EventSource(`/api/groups/${slug}/stream`);
    _groupSSE.onmessage=function(e){
      try{
        const msg=JSON.parse(e.data);
        if(msg.id>_lastMsgId){_lastMsgId=msg.id;appendMessage(msg);}
      }catch(err){}
    };
    _groupSSE.onerror=function(){
      _groupSSE.close();_groupSSE=null;
      // Fallback to polling on SSE error
      if(!pollInterval) pollInterval=setInterval(loadMessages,3000);
    };
  }catch(err){
    pollInterval=setInterval(loadMessages,3000);
  }
}

async function loadGroup(){
  try{
    groupData=await api(`/api/groups/${slug}`);
    myRole=groupData.my_role;
    document.title=`${groupData.name} — Bilimxon`;
    renderGroupHeader();renderSidebar();
    // Show mod tab for admins/owners
    var modTab = document.getElementById('modTab');
    if(modTab && (myRole==='owner'||myRole==='admin')) modTab.style.display='';
    if(groupData.is_member){
      document.getElementById('inputArea').style.display='';
      document.getElementById('joinBar').style.display='none';
    }else{
      document.getElementById('joinBar').style.display='';
      document.getElementById('inputArea').style.display='none';
    }
    await loadMessages();
  }catch(e){document.getElementById('groupHeader').innerHTML='<p style="color:var(--danger);">Topilmadi</p>';}
}

function renderGroupHeader(){
  const g=groupData;
  document.getElementById('groupHeader').innerHTML=`
    <div class="g-avatar">${g.avatar?`<img src="${g.avatar}">`:(g.name||'G')[0]}</div>
    <div style="flex:1;">
      <div class="group-header-name">${g.name} <span style="font-size:.7rem;color:${g.group_type==='channel'?'#22C55E':'#C9A84C'};">${g.group_type==='channel'?'📢':'👥'}</span></div>
      <div class="group-header-sub"><span class="rt-dot"></span>Real-time · 👥 ${g.member_count} a'zo · ${g.is_public?'Ochiq':'Yopiq'}</div>
    </div>
    <div class="group-header-actions">
      ${myRole==='owner'||myRole==='admin'?`<button class="g-hbtn" onclick="showGTab('settings',null)" title="Sozlamalar">⚙️</button>`:''}
      ${groupData.group_category==='study'?`<a class="g-hbtn" href="/group/${slug}/leaderboard" title="O'quv reytingi" style="text-decoration:none;">🏆</a>`:''}
      ${myRole==='owner'||myRole==='admin'?`<button class="g-hbtn" onclick="showInviteLink()" title="Taklif havolasi">🔗</button>`:''}
      ${groupData.is_member&&myRole!=='owner'?`<button class="g-hbtn" onclick="leaveGroup()" title="Chiqish" style="color:#EF4444;">🚪</button>`:''}
      <a href="/groups" class="g-hbtn" style="text-decoration:none;" title="Orqaga">←</a>
    </div>`;

  document.getElementById('groupInfoBanner').innerHTML=`
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px;">
      <div style="width:46px;height:46px;border-radius:12px;background:rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;overflow:hidden;font-size:1.4rem;font-weight:800;flex-shrink:0;">
        ${g.avatar?`<img src="${g.avatar}" style="width:100%;height:100%;object-fit:cover;">`:(g.name||'G')[0]}
      </div>
      <div>
        <div style="font-weight:800;font-size:.92rem;">${g.name}</div>
        <div style="font-size:.72rem;opacity:.5;margin-top:2px;">@${g.slug} · ${g.member_count} a'zo</div>
      </div>
    </div>
    ${g.bio?`<div style="font-size:.78rem;opacity:.65;line-height:1.5;background:rgba(255,255,255,.06);border-radius:10px;padding:8px 10px;">${g.bio}</div>`:''}
    ${g.group_category==='study'?`<a href="/group/${g.slug}/leaderboard" style="display:block;margin-top:8px;padding:7px 10px;background:rgba(201,168,76,.12);border:1px solid rgba(201,168,76,.2);border-radius:10px;color:#C9A84C;font-size:.76rem;font-weight:700;text-decoration:none;text-align:center;">🏆 Guruh Reytingi</a>`:''}`;
}

function renderSidebar(){
  const members = groupData.members||[];
  const mc = document.getElementById('memberCount');
  if(mc) mc.textContent = members.length + ' ta';
  document.getElementById('membersList').innerHTML=members.map(m=>`
    <div class="member-item" onclick="window.location='/profile/${m.username}'">
      <div class="m-av">${m.avatar?`<img src="${m.avatar}">`:m.full_name[0]}</div>
      <div style="flex:1;min-width:0;">
        <div class="m-name">${m.full_name} ${m.has_tick?'<span class="tick">✓</span>':''}</div>
        <div style="display:flex;gap:4px;align-items:center;margin-top:2px;">
          ${m.role==='owner'?'<span class="role-b role-owner">👑 Owner</span>':m.role==='admin'?'<span class="role-b role-admin">🛡 Admin</span>':''}
        </div>
      </div>
    </div>`).join('');
}

function showGTab(name, btnEl) {
  ['members','media','settings','moderation'].forEach(t=>{
    var el = document.getElementById('gTab'+t.charAt(0).toUpperCase()+t.slice(1));
    if(el) el.style.display = t===name ? '' : 'none';
  });
  document.querySelectorAll('.gsb-tab').forEach((el,i)=>{
    var tabs = ['members','media','settings','moderation'];
    el.classList.toggle('active', tabs[i]===name);
  });
  if(name==='settings') renderGroupSettings();
}

function renderGroupSettings(){
  var g = groupData;
  var isOwner = myRole==='owner';
  var panel = document.getElementById('groupSettingsPanel');
  if(!panel) return;
  panel.innerHTML = `
    <div class="gset-row">
      <div><div class="gset-label">Guruh nomi</div><div class="gset-sub">${g.name}</div></div>
      ${isOwner?`<button onclick="editGroupName()" style="font-size:.75rem;padding:4px 10px;background:rgba(201,168,76,.12);border:1px solid rgba(201,168,76,.25);border-radius:8px;color:#C9A84C;cursor:pointer;">✏️</button>`:''}
    </div>
    <div class="gset-row">
      <div><div class="gset-label">Bio / Tavsif</div><div class="gset-sub">${g.bio||'Mavjud emas'}</div></div>
      ${isOwner?`<button onclick="editGroupBio()" style="font-size:.75rem;padding:4px 10px;background:rgba(201,168,76,.12);border:1px solid rgba(201,168,76,.25);border-radius:8px;color:#C9A84C;cursor:pointer;">✏️</button>`:''}
    </div>
    <div class="gset-row">
      <div>
        <div class="gset-label">Kirish turi</div>
        <div class="gset-sub">${g.is_public?'🌍 Ochiq':`🔒 Yopiq`}</div>
      </div>
      ${isOwner?`<label class="gset-toggle"><input type="checkbox" ${g.is_public?'checked':''} onchange="toggleGroupPublic(this.checked)"><span class="gset-slider"></span></label>`:''}
    </div>
    <div class="gset-row">
      <div><div class="gset-label">A'zo soni</div><div class="gset-sub">${g.member_count} ta a'zo</div></div>
    </div>
    <div class="gset-row">
      <div><div class="gset-label">Rasm/Media</div><div class="gset-sub">Guruh avatarini o'zgartirish</div></div>
      ${isOwner?`<label style="font-size:.75rem;padding:4px 10px;background:rgba(201,168,76,.12);border:1px solid rgba(201,168,76,.25);border-radius:8px;color:#C9A84C;cursor:pointer;">📷 O'zgartir<input type="file" accept="image/*" style="display:none;" onchange="uploadGroupAvatar(this)"></label>`:''}
    </div>
    ${isOwner||myRole==='admin'?`
    <div class="gset-row" style="margin-top:4px;">
      <button onclick="openModerationPanel()" style="width:100%;padding:10px;background:rgba(201,168,76,.09);border:1px solid rgba(201,168,76,.2);border-radius:10px;color:#C9A84C;cursor:pointer;font-weight:700;font-size:.85rem;">🛡️ Moderatsiya Paneli</button>
    </div>
    <div class="gset-row">
      <button onclick="inviteByUsername()" style="width:100%;padding:10px;background:rgba(59,130,246,.09);border:1px solid rgba(59,130,246,.2);border-radius:10px;color:#60A5FA;cursor:pointer;font-weight:700;font-size:.85rem;">📨 Foydalanuvchi Taklif Qilish</button>
    </div>
    <div class="gset-row">

function msgMediaHTML(m,isMine){
  const t=m.msg_type;
  if(t==='image'||t==='gif'){
    return`<div class="gm-img"><img src="${m.media_url}" alt="Rasm" loading="lazy" onclick="window.open('${m.media_url}','_blank')"></div>`;
  }
  if(t==='video'){
    return`<div class="gm-video"><video src="${m.media_url}" controls preload="metadata"></video></div>`;
  }
  if(t==='audio'){
    return`<div class="gm-audio ${isMine?'mine':''}">🎤<audio src="${m.media_url}" controls></audio></div>`;
  }
  if(t==='sticker'){
    return`<div class="gm-sticker"><img src="${m.media_url}" alt="Sticker"></div>`;
  }
  return`<div class="gm-text ${isMine?'mine':''}">${escapeHtml(m.content)}</div>`;
}

function msgToHTML(m){
  const isMine=m.user_id===myId;
  const time=new Date((m.created_at||'').replace(' ','T')+'Z').toLocaleTimeString('uz',{hour:'2-digit',minute:'2-digit'});
  return`<div class="gmsg ${isMine?'mine':''}" id="msg-${m.id}">
    ${!isMine?`<div class="gm-av" onclick="window.location='/profile/${m.username}'" title="${m.full_name||''}">
      ${m.avatar?`<img src="${m.avatar}">`:(m.full_name||'?')[0]}</div>`:
      `<div style="width:32px;flex-shrink:0;"></div>`}
    <div class="gm-bubble">
      ${!isMine?`<div class="gm-name">${m.full_name||''}${m.has_tick?'<span class="tick" style="font-size:.5rem;">✓</span>':''}</div>`:''}
      ${msgMediaHTML(m,isMine)}
      <div class="gm-time" style="text-align:${isMine?'right':'left'};">${time}</div>
    </div>
  </div>`;
}

function appendMessage(m){
  const area=document.getElementById('msgsArea');
  if(!area)return;
  if(document.getElementById('msg-'+m.id))return; // duplicate guard
  const wasAtBottom=area.scrollTop+area.clientHeight>=area.scrollHeight-80;
  const el=document.createElement('div');
  el.innerHTML=msgToHTML(m);
  area.appendChild(el.firstElementChild);
  if(wasAtBottom)area.scrollTop=area.scrollHeight;
}

async function loadMessages(){
  const area=document.getElementById('msgsArea');
  if(!area)return;
  const wasAtBottom=area.scrollTop+area.clientHeight>=area.scrollHeight-50;
  try{
    const msgs=await api(`/api/groups/${slug}/messages`);
    if(!msgs.length){
      area.innerHTML=`<div style="text-align:center;padding:60px;color:var(--gray-400);">
        <div style="font-size:2.5rem;margin-bottom:12px;">💬</div>
        <p>Hali xabar yo'q. Birinchi bo'lib yozing!</p></div>`;
      return;
    }
    area.innerHTML=msgs.map(msgToHTML).join('');
    if(msgs.length) _lastMsgId=msgs[msgs.length-1].id;
    if(wasAtBottom)area.scrollTop=area.scrollHeight;
  }catch(e){}
}

async function sendMsg(){
  const input=document.getElementById('groupInput');
  const content=input?.value.trim();
  if(!content)return;
  input.value='';input.style.height='auto';
  try{
    const res=await api(`/api/groups/${slug}/send`,{method:'POST',body:JSON.stringify({content})});
    if(res.success){
      // If no SSE, manually reload
      if(!_groupSSE||_groupSSE.readyState!==1) await loadMessages();
    }
  }catch(e){showToast(e.message,'error');}
}

function handleKey(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}
}
function autoResize(el){
  el.style.height='auto';el.style.height=Math.min(el.scrollHeight,100)+'px';
}

// ── MEDIA UPLOAD ──
async function uploadMedia(input,type){
  const file=input.files[0];if(!file)return;
  const form=new FormData();form.append('file',file);
  showToast('Yuklanmoqda...','info');
  try{
    const res=await fetch(`/api/groups/${slug}/upload-media`,{method:'POST',body:form});
    const d=await res.json();
    if(d.success){showToast('Yuborildi!','success');await loadMessages();}
    else showToast(d.error||'Xato','error');
  }catch(e){showToast(e.message,'error');}
  input.value='';
}

// ── VOICE RECORDING ──
async function toggleVoice(){
  if(isRecording){stopRecording();}
  else{await startRecording();}
}

async function startRecording(){
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    mediaRecorder=new MediaRecorder(stream);
    audioChunks=[];
    mediaRecorder.ondataavailable=e=>audioChunks.push(e.data);
    mediaRecorder.onstop=()=>sendAudioMessage(stream);
    mediaRecorder.start();
    isRecording=true;
    document.getElementById('recIndicator').style.display='flex';
    document.getElementById('voiceBtn').textContent='⏹️ To\'xtatish';
    document.getElementById('voiceBtn').style.borderColor='var(--danger)';
    document.getElementById('voiceBtn').style.color='var(--danger)';
  }catch(e){showToast('Mikrofon ruxsati yo\'q','error');}
}

function stopRecording(){
  if(mediaRecorder&&isRecording){mediaRecorder.stop();isRecording=false;}
}

function cancelRecording(){
  if(mediaRecorder){mediaRecorder.stop();audioChunks=[];}
  isRecording=false;
  document.getElementById('recIndicator').style.display='none';
  document.getElementById('voiceBtn').textContent='🎤 Ovozli xabar';
  document.getElementById('voiceBtn').style.borderColor='';
  document.getElementById('voiceBtn').style.color='';
}

async function sendAudioMessage(stream){
  stream.getTracks().forEach(t=>t.stop());
  document.getElementById('recIndicator').style.display='none';
  document.getElementById('voiceBtn').textContent='🎤 Ovozli xabar';
  document.getElementById('voiceBtn').style.borderColor='';
  document.getElementById('voiceBtn').style.color='';
  if(!audioChunks.length)return;
  const blob=new Blob(audioChunks,{type:'audio/ogg;codecs=opus'});
  const form=new FormData();
  form.append('file',blob,'voice_message.ogg');
  showToast('Ovozli xabar yuborilmoqda...','info');
  try{
    const res=await fetch(`/api/groups/${slug}/upload-media`,{method:'POST',body:form});
    const d=await res.json();
    if(d.success){showToast('Yuborildi!','success');await loadMessages();}
    else showToast(d.error||'Xato','error');
  }catch(e){showToast(e.message,'error');}
}

// ── MODERATION ──
async function openModerationPanel(){
  try{
    const members=await api(`/api/groups/${slug}/members-moderation`);
    const rows=members.map(m=>`
      <div style="display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid rgba(255,255,255,.06);">
        <div style="width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#1B3A6B,#C9A84C);display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:.82rem;overflow:hidden;flex-shrink:0;">
          ${m.avatar?`<img src="${m.avatar}" style="width:100%;height:100%;object-fit:cover;">`:(m.full_name||'?')[0]}
        </div>
        <div style="flex:1;min-width:0;">
          <div style="font-size:.84rem;font-weight:700;color:white;">${m.full_name||m.username}
            ${m.is_muted?'<span style="background:#fef3c7;color:#92400e;font-size:.65rem;padding:1px 6px;border-radius:999px;margin-left:4px;">Jim</span>':''}
            ${m.is_banned?'<span style="background:#fee2e2;color:#991b1b;font-size:.65rem;padding:1px 6px;border-radius:999px;margin-left:4px;">Ban</span>':''}
          </div>
          <div style="font-size:.72rem;color:rgba(255,255,255,.35);">@${m.username} · ${m.role}</div>
        </div>
        ${m.role!=='owner'?`
        <div style="display:flex;gap:4px;flex-shrink:0;">
          <button onclick="toggleMute(${m.id},${m.is_muted?0:1},'${m.username}')" style="font-size:.7rem;padding:3px 8px;border-radius:8px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.6);cursor:pointer;">${m.is_muted?'🔊 Jim emas':'🔇 Jim'}</button>
          <button onclick="kickMember(${m.id},'${m.username}')" style="font-size:.7rem;padding:3px 8px;border-radius:8px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:#f87171;cursor:pointer;">🚪 Chiqar</button>
          <button onclick="toggleBan(${m.id},${m.is_banned?0:1},'${m.username}')" style="font-size:.7rem;padding:3px 8px;border-radius:8px;background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.25);color:#f87171;cursor:pointer;">${m.is_banned?'✅ Banlift':'🚫 Ban'}</button>
        </div>`:''
        }
      </div>`).join('');
    openModal(`<div class="modal-header"><span class="modal-title">🛡️ Moderatsiya Paneli</span><button class="modal-close">✕</button></div>
      <div style="max-height:400px;overflow-y:auto;background:#17212b;border-radius:10px;">
        ${rows||'<div style="padding:20px;text-align:center;color:rgba(255,255,255,.3);">A\'zolar yo\'q</div>'}
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline modal-close">Yopish</button>
        <button class="btn btn-primary" onclick="inviteByUsername()">📨 Taklif Qilish</button>
      </div>`);
  }catch(e){showToast(e.message,'error');}
}

async function toggleMute(userId,muted,uname){
  try{
    await api(`/api/groups/${slug}/mute`,{method:'POST',body:JSON.stringify({user_id:userId,muted})});
    showToast(muted?`@${uname} jim qilindi`:`@${uname} jim emas`,'success');
    openModerationPanel();
  }catch(e){showToast(e.message,'error');}
}

async function kickMember(userId,uname){
  const ok=await confirmDialog(`@${uname} ni guruhdan chiqarasizmi?`);
  if(!ok)return;
  try{
    await api(`/api/groups/${slug}/kick`,{method:'POST',body:JSON.stringify({user_id:userId})});
    showToast(`@${uname} chiqarildi`,'success');closeModal();await loadGroup();
  }catch(e){showToast(e.message,'error');}
}

async function toggleBan(userId,banned,uname){
  const ok=await confirmDialog(banned?`@${uname} ni ban qilasizmi?`:`@${uname} banini ko'tarasizmi?`);
  if(!ok)return;
  try{
    const ep=banned?'ban':'unban';
    await api(`/api/groups/${slug}/${ep}`,{method:'POST',body:JSON.stringify({user_id:userId})});
    showToast(banned?`@${uname} ban qilindi`:`@${uname} ban ko'tarildi`,'success');
    openModerationPanel();
  }catch(e){showToast(e.message,'error');}
}

function openSettings(){
  showToast('Sozlamalar yakllanmoqda...','info');
}

function escapeHtml(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>').replace(/@(\w+)/g,'<a href="/profile/$1" onclick="event.stopPropagation()" style="color:#C9A84C;font-weight:700;text-decoration:none;">@$1</a>');
}

document.addEventListener('DOMContentLoaded',init);
